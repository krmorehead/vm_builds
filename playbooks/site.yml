---
# ── Phase 1: Primary host (directly reachable) ──────────────────

- name: Back up primary Proxmox hosts
  hosts: proxmox:!lan_hosts
  gather_facts: true
  tags: [backup]
  roles:
    - proxmox_backup
    - role: deploy_stamp
      vars:
        deploy_stamp_play: backup

- name: Configure shared infrastructure on primary hosts
  hosts: proxmox:!lan_hosts
  gather_facts: true
  tags: [infra]
  pre_tasks:
    - name: Force NTP clock sync before infrastructure setup
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if command -v chronyc >/dev/null 2>&1; then
            systemctl restart chronyd 2>/dev/null || true
            chronyc -a 'burst 4/4' 2>/dev/null || true
            sleep 6
            chronyc -a makestep 2>/dev/null || true
          elif command -v ntpdate >/dev/null 2>&1; then
            ntpdate -b pool.ntp.org 2>/dev/null || true
          fi
        executable: /bin/bash
      changed_when: false
      failed_when: false
  roles:
    - proxmox_bridges
    - proxmox_pci_passthrough
    - proxmox_igpu
    - role: deploy_stamp
      vars:
        deploy_stamp_play: infrastructure

- name: Provision OpenWrt VM
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt]
  roles:
    - openwrt_vm
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_vm

- name: Configure OpenWrt
  hosts: openwrt
  gather_facts: false
  tags: [openwrt]
  roles:
    - openwrt_configure

# ── Phase 2: LAN satellites (reachable after OpenWrt) ───────────

- name: Bootstrap LAN satellite hosts
  hosts: router_nodes
  gather_facts: true
  tags: [lan-satellite]
  tasks:
    - name: Bootstrap each LAN host
      ansible.builtin.include_tasks: ../tasks/bootstrap_lan_host.yml
      vars:
        _lan_host_ip: "{{ hostvars[item].ansible_host }}"
        _lan_host_name: "{{ item }}"
      loop: "{{ groups['lan_hosts'] | default([]) }}"
      when: groups['lan_hosts'] | default([]) | length > 0

- name: Back up LAN satellite hosts
  hosts: lan_hosts
  gather_facts: true
  tags: [lan-satellite, backup]
  roles:
    - proxmox_backup
    - role: deploy_stamp
      vars:
        deploy_stamp_play: backup

- name: Configure shared infrastructure on LAN satellites
  hosts: lan_hosts
  gather_facts: true
  tags: [lan-satellite, infra]
  pre_tasks:
    - name: Force NTP clock sync before infrastructure setup
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if command -v chronyc >/dev/null 2>&1; then
            systemctl restart chronyd 2>/dev/null || true
            chronyc -a 'burst 4/4' 2>/dev/null || true
            sleep 6
            chronyc -a makestep 2>/dev/null || true
          elif command -v ntpdate >/dev/null 2>&1; then
            ntpdate -b pool.ntp.org 2>/dev/null || true
          fi
        executable: /bin/bash
      changed_when: false
      failed_when: false
  roles:
    - proxmox_bridges
    - proxmox_pci_passthrough
    - proxmox_igpu
    - role: deploy_stamp
      vars:
        deploy_stamp_play: infrastructure

# ── Phase 3: Services (flavor groups span all hosts) ─────────────

- name: Provision Pi-hole LXC
  hosts: dns_nodes
  gather_facts: false
  tags: [pihole]
  roles:
    - pihole_lxc
    - role: deploy_stamp
      vars:
        deploy_stamp_play: pihole_lxc

- name: Configure Pi-hole
  hosts: pihole
  gather_facts: true
  tags: [pihole]
  roles:
    - pihole_configure

- name: Provision WireGuard LXC
  hosts: vpn_nodes
  gather_facts: false
  tags: [wireguard]
  roles:
    - wireguard_lxc
    - role: deploy_stamp
      vars:
        deploy_stamp_play: wireguard_lxc

- name: Configure WireGuard
  hosts: wireguard
  gather_facts: true
  tags: [wireguard]
  roles:
    - wireguard_configure

- name: Provision OpenWrt Mesh LXC
  hosts: wifi_nodes:!router_nodes
  gather_facts: false
  tags: [mesh-wifi]
  roles:
    - openwrt_mesh_lxc
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_mesh_lxc

- name: Configure OpenWrt Mesh
  hosts: openwrt_mesh
  gather_facts: false
  tags: [mesh-wifi]
  roles:
    - openwrt_mesh_configure

# ── Per-feature plays (opt-in via tags + never) ─────────────────

- name: Harden OpenWrt security
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-security, never]
  tasks:
    - name: Apply security hardening
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: security.yml

- name: Record security hardening
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-security, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_security

- name: Configure OpenWrt VLANs
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-vlans, never]
  tasks:
    - name: Apply VLAN configuration
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: vlans.yml

- name: Record VLAN configuration
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-vlans, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_vlans

- name: Configure OpenWrt encrypted DNS
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-dns, never]
  tasks:
    - name: Apply encrypted DNS
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: dns.yml

- name: Record encrypted DNS
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-dns, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_dns

- name: Configure OpenWrt mesh enhancements
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-mesh, never]
  tasks:
    - name: Apply mesh enhancements
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: mesh.yml

- name: Record mesh enhancements
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-mesh, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_mesh

- name: Reconstruct openwrt group for Pi-hole DNS forwarding
  hosts: router_nodes
  gather_facts: true
  tags:
    - openwrt-pihole-dns
    - openwrt-pihole-dns-rollback
    - never
  tasks:
    - name: Include group reconstruction
      ansible.builtin.include_tasks: ../tasks/reconstruct_openwrt_group.yml

- name: Apply Pi-hole DNS forwarding to OpenWrt
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-pihole-dns, never]
  tasks:
    - name: Include Pi-hole DNS tasks
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: pihole_dns.yml

- name: Record Pi-hole DNS forwarding
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-pihole-dns, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_pihole_dns

- name: Clean up bootstrap networking
  hosts: proxmox:!lan_hosts
  gather_facts: false
  tags: [cleanup]
  vars:
    openwrt_bootstrap_ip: 192.168.1.2
    openwrt_bootstrap_cidr: 24
  tasks:
    - name: Remove temporary bootstrap IP from LAN bridge
      ansible.builtin.command:
        cmd: >-
          ip addr del
          {{ openwrt_bootstrap_ip }}/{{ openwrt_bootstrap_cidr }}
          dev {{ _bootstrap_bridge }}
      failed_when: false
      changed_when: true
      when: _bootstrap_bridge is defined
