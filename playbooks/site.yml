---
- name: Back up current Proxmox state
  hosts: proxmox
  gather_facts: true
  tags: [backup]
  roles:
    - proxmox_backup
    - role: deploy_stamp
      vars:
        deploy_stamp_play: backup

- name: Configure shared Proxmox infrastructure
  hosts: proxmox
  gather_facts: true
  tags: [infra]
  roles:
    - proxmox_bridges
    - proxmox_pci_passthrough
    - proxmox_igpu
    - role: deploy_stamp
      vars:
        deploy_stamp_play: infrastructure

- name: Provision OpenWrt VM
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt]
  roles:
    - openwrt_vm
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_vm

- name: Configure OpenWrt
  hosts: openwrt
  gather_facts: false
  tags: [openwrt]
  roles:
    - openwrt_configure

# ── Per-feature plays (opt-in via tags + never) ─────────────────

- name: Harden OpenWrt security
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-security, never]
  tasks:
    - name: Apply security hardening
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: security.yml

- name: Record security hardening
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-security, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_security

- name: Configure OpenWrt VLANs
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-vlans, never]
  tasks:
    - name: Apply VLAN configuration
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: vlans.yml

- name: Record VLAN configuration
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-vlans, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_vlans

- name: Configure OpenWrt encrypted DNS
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-dns, never]
  tasks:
    - name: Apply encrypted DNS
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: dns.yml

- name: Record encrypted DNS
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-dns, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_dns

- name: Configure OpenWrt mesh enhancements
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-mesh, never]
  tasks:
    - name: Apply mesh enhancements
      ansible.builtin.include_role:
        name: openwrt_configure
        tasks_from: mesh.yml

- name: Record mesh enhancements
  hosts: router_nodes
  gather_facts: false
  tags: [openwrt-mesh, never]
  roles:
    - role: deploy_stamp
      vars:
        deploy_stamp_play: openwrt_mesh

- name: Clean up bootstrap networking
  hosts: proxmox
  gather_facts: false
  tags: [cleanup]
  vars:
    openwrt_bootstrap_ip: 192.168.1.2
    openwrt_bootstrap_cidr: 24
  tasks:
    - name: Remove temporary bootstrap IP from LAN bridge
      ansible.builtin.command:
        cmd: >-
          ip addr del
          {{ openwrt_bootstrap_ip }}/{{ openwrt_bootstrap_cidr }}
          dev {{ _bootstrap_bridge }}
      failed_when: false
      changed_when: true
      when: _bootstrap_bridge is defined
