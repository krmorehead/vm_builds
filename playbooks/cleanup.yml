---
# ── Per-feature rollback: reconstruct openwrt dynamic group ──────
# This play discovers the running VM's LAN IP and registers the
# openwrt host so rollback plays can target it.  Tagged with ALL
# rollback tags so it runs before any rollback play.

- name: Reconstruct openwrt dynamic group for rollback
  hosts: router_nodes
  gather_facts: true
  tags:
    - openwrt-security-rollback
    - openwrt-vlans-rollback
    - openwrt-dns-rollback
    - openwrt-mesh-rollback
    - never
  tasks:
    - name: Include group reconstruction
      ansible.builtin.include_tasks: ../tasks/reconstruct_openwrt_group.yml

# ── Per-feature rollback: security hardening ─────────────────────

- name: Rollback security hardening
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-security-rollback, never]
  tasks:
    - name: Remove banIP package
      ansible.builtin.raw: opkg remove banip 2>/dev/null; true
      changed_when: true

    - name: Re-enable password auth in dropbear
      ansible.builtin.raw: |
        uci delete dropbear.@dropbear[0].PasswordAuth 2>/dev/null
        uci delete dropbear.@dropbear[0].RootPasswordAuth 2>/dev/null
        uci commit dropbear
        /etc/init.d/dropbear restart
      changed_when: true

    - name: Remove SSH authorized keys
      ansible.builtin.raw: rm -f /etc/dropbear/authorized_keys
      changed_when: true

    - name: Clear root password (restore empty-password baseline)
      ansible.builtin.raw: sed -i 's/^root:[^:]*:/root::/' /etc/shadow
      changed_when: true

    - name: Revert firewall hardening
      ansible.builtin.raw: |
        uci delete firewall.@defaults[0].syn_flood 2>/dev/null
        uci delete firewall.@defaults[0].drop_invalid 2>/dev/null
        uci commit firewall
        /etc/init.d/firewall restart
      changed_when: true

# ── Per-feature rollback: VLAN support ───────────────────────────

- name: Rollback VLAN configuration
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-vlans-rollback, never]
  tasks:
    - name: Delete VLAN interfaces and firewall zones
      ansible.builtin.raw: |
        uci delete network.vlan_iot 2>/dev/null
        uci delete network.vlan_guest 2>/dev/null
        uci delete network.vlan_iot_dev 2>/dev/null
        uci delete network.vlan_guest_dev 2>/dev/null
        for section in $(uci show firewall 2>/dev/null | grep -E "firewall\.\w+\.name='vlan_(iot|guest)'" | cut -d. -f1-2); do
          uci delete "$section" 2>/dev/null
        done
        for section in $(uci show firewall 2>/dev/null | grep -E "firewall\.\w+\.src='vlan_(iot|guest)'" | cut -d. -f1-2); do
          uci delete "$section" 2>/dev/null
        done
        for section in $(uci show dhcp 2>/dev/null | grep -E "dhcp\.\w+\.interface='vlan_(iot|guest)'" | cut -d. -f1-2); do
          uci delete "$section" 2>/dev/null
        done
        uci commit
        /etc/init.d/network restart
        /etc/init.d/firewall restart
      changed_when: true

# ── Per-feature rollback: encrypted DNS ──────────────────────────

- name: Rollback encrypted DNS
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-dns-rollback, never]
  tasks:
    - name: Remove https-dns-proxy and revert dnsmasq
      ansible.builtin.raw: |
        opkg remove https-dns-proxy 2>/dev/null
        uci delete dhcp.@dnsmasq[0].noresolv 2>/dev/null
        uci delete dhcp.@dnsmasq[0].rebind_protection 2>/dev/null
        uci delete dhcp.@dnsmasq[0].rebind_localhost 2>/dev/null
        uci -q show dhcp | grep 'server=' | while read line; do
          section=$(echo "$line" | cut -d= -f1)
          uci delete "$section" 2>/dev/null
        done
        uci commit dhcp
        /etc/init.d/dnsmasq restart
      changed_when: true

# ── Per-feature rollback: mesh enhancements ──────────────────────

- name: Rollback mesh enhancements
  hosts: openwrt
  gather_facts: false
  tags: [openwrt-mesh-rollback, never]
  tasks:
    - name: Remove Dawn and mesh monitoring
      ansible.builtin.raw: |
        opkg remove dawn 2>/dev/null
        crontab -l 2>/dev/null | grep -v 'mesh_peer' | crontab - 2>/dev/null
        uci commit
      changed_when: true

# ── Per-feature rollback: WireGuard VPN ───────────────────────────

- name: Reconstruct wireguard dynamic group for rollback
  hosts: vpn_nodes
  gather_facts: false
  tags: [wireguard-rollback, never]
  tasks:
    - name: Include group reconstruction
      ansible.builtin.include_tasks: ../tasks/reconstruct_wireguard_group.yml

- name: Rollback WireGuard VPN
  hosts: vpn_nodes
  gather_facts: false
  tags: [wireguard-rollback, never]
  tasks:
    - name: Stop and destroy WireGuard container
      ansible.builtin.shell:
        cmd: |
          pct stop {{ wireguard_ct_id }} 2>/dev/null || true
          sleep 2
          pct destroy {{ wireguard_ct_id }} --purge 2>/dev/null || true
        executable: /bin/bash
      changed_when: true

    - name: Remove wireguard module persistence
      ansible.builtin.file:
        path: /etc/modules-load.d/wireguard.conf
        state: absent

    - name: Unload wireguard kernel module
      ansible.builtin.command:
        cmd: modprobe -r wireguard
      failed_when: false
      changed_when: true

    - name: Remove generated env files from controller
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ env_generated_path }}"
        - "{{ project_root }}/.env.generated"
        - "{{ project_root }}/test.env.generated"
      delegate_to: localhost

# ── Per-feature rollback: mesh WiFi LXC ────────────────────────

- name: Rollback mesh WiFi LXC
  hosts: wifi_nodes:!router_nodes
  gather_facts: false
  tags: [mesh-wifi-rollback, never]
  tasks:
    - name: Stop and destroy mesh WiFi container
      ansible.builtin.shell:
        cmd: |
          pct stop {{ meshwifi_ct_id }} 2>/dev/null || true
          sleep 2
          pct destroy {{ meshwifi_ct_id }} --purge 2>/dev/null || true
        executable: /bin/bash
      changed_when: true

    - name: Remove mesh WiFi PHY hookscript
      ansible.builtin.file:
        path: "/var/lib/vz/snippets/mesh-wifi-phy-{{ meshwifi_ct_id }}.sh"
        state: absent

    - name: Remove cached OpenWrt LXC template
      ansible.builtin.shell:
        cmd: rm -f /var/lib/vz/template/cache/openwrt-*.tar.gz
        executable: /bin/bash
      changed_when: true
      failed_when: false

# ── Full host restore (existing) ────────────────────────────────

- name: Restore Proxmox host from backup
  hosts: proxmox:!lan_hosts
  gather_facts: false
  vars:
    backup_dir: /var/lib/ansible-backup

  tasks:
    # ── Shared: verify backup exists ──────────────────────────────
    - name: Check for backup manifest
      ansible.builtin.stat:
        path: "{{ backup_dir }}/manifest.json"
      register: manifest_stat
      tags: [restore, full-restore, clean]

    - name: Fail if no backup exists
      ansible.builtin.fail:
        msg: >-
          No backup found at {{ backup_dir }}/manifest.json.
          Run the playbook first to create a backup.
      when: not manifest_stat.stat.exists
      tags: [restore, full-restore, clean]

    - name: Read backup manifest
      ansible.builtin.slurp:
        src: "{{ backup_dir }}/manifest.json"
      register: manifest_raw
      tags: [restore, full-restore, clean]

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ manifest_raw.content | b64decode | from_json }}"
      tags: [restore, full-restore, clean]

    # ── Destroy VMs (full-restore and clean) ──────────────────────
    - name: List all current VMs
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          qm list 2>/dev/null | awk 'NR>1 {print $1}'
        executable: /bin/bash
      register: current_vms
      changed_when: false
      tags: [full-restore, clean, never]

    - name: Stop all VMs
      ansible.builtin.command:
        cmd: qm stop {{ item }}
      loop: "{{ current_vms.stdout_lines | default([]) }}"
      failed_when: false
      tags: [full-restore, clean, never]

    - name: Wait for VMs to stop
      ansible.builtin.pause:
        seconds: 5
      when: current_vms.stdout_lines | default([]) | length > 0
      tags: [full-restore, clean, never]

    - name: Destroy all VMs
      ansible.builtin.command:
        cmd: qm destroy {{ item }} --purge
      loop: "{{ current_vms.stdout_lines | default([]) }}"
      failed_when: false
      tags: [full-restore, clean, never]

    # ── Destroy LXC containers (full-restore and clean) ───────────
    - name: List all current containers
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct list 2>/dev/null | awk 'NR>1 {print $1}'
        executable: /bin/bash
      register: current_cts
      changed_when: false
      tags: [full-restore, clean, never]

    - name: Stop all containers
      ansible.builtin.command:
        cmd: pct stop {{ item }}
      loop: "{{ current_cts.stdout_lines | default([]) }}"
      failed_when: false
      tags: [full-restore, clean, never]

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 3
      when: current_cts.stdout_lines | default([]) | length > 0
      tags: [full-restore, clean, never]

    - name: Destroy all containers
      ansible.builtin.command:
        cmd: pct destroy {{ item }} --purge
      loop: "{{ current_cts.stdout_lines | default([]) }}"
      failed_when: false
      tags: [full-restore, clean, never]

    # ── Restore VMs from vzdump (full-restore only) ───────────────
    - name: Restore backed-up VMs
      ansible.builtin.command:
        cmd: qmrestore {{ item }} {{ vm_id }} --force true
      loop: "{{ manifest.vms | default([]) }}"
      loop_control:
        index_var: _idx
      vars:
        vm_id: "{{ manifest.vm_ids[_idx] }}"
      when: manifest.vms | default([]) | length > 0
      tags: [full-restore, never]

    - name: Start restored VMs
      ansible.builtin.command:
        cmd: qm start {{ item }}
      loop: "{{ manifest.vm_ids | default([]) }}"
      failed_when: false
      when: manifest.vm_ids | default([]) | length > 0
      tags: [full-restore, never]

    # ── Restore host config (all modes) ───────────────────────────
    - name: Unbind devices from vfio-pci
      ansible.builtin.shell:
        cmd: |
          for dev in /sys/bus/pci/drivers/vfio-pci/0000:*/; do
            [ -d "$dev" ] || continue
            addr=$(basename "$dev")
            echo "$addr" > /sys/bus/pci/drivers/vfio-pci/unbind 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true
      failed_when: false
      tags: [restore, full-restore, clean]

    - name: Remove ansible-managed config files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/network/interfaces.d/ansible-bridges.conf
        - /etc/network/interfaces.d/ansible-proxmox-lan.conf
        - /etc/network/interfaces.d/ansible-temp-lan.conf
        - /etc/modprobe.d/blacklist-wifi.conf
        - /etc/modprobe.d/vfio-pci.conf
        - /etc/ansible/facts.d/vm_builds.fact
        - /etc/apt/sources.list.d/pve-no-subscription.sources
        - /etc/modules-load.d/wireguard.conf
        - /tmp/openwrt-router-24.10.0-x86-64-combined.img.gz
        - /tmp/openwrt-router-24.10.0-x86-64-combined.img
      tags: [restore, full-restore, clean]

    - name: Remove cached LXC templates
      ansible.builtin.shell:
        cmd: rm -f /var/lib/vz/template/cache/debian-*.tar.zst /var/lib/vz/template/cache/openwrt-*.tar.gz
        executable: /bin/bash
      changed_when: true
      failed_when: false
      tags: [full-restore, clean]

    - name: Remove mesh WiFi PHY hookscripts
      ansible.builtin.shell:
        cmd: rm -f /var/lib/vz/snippets/mesh-wifi-phy-*.sh
        executable: /bin/bash
      changed_when: true
      failed_when: false
      tags: [full-restore, clean]

    - name: Re-enable enterprise repos if disabled
      ansible.builtin.shell:
        cmd: |
          for f in /etc/apt/sources.list.d/pve-enterprise.sources.disabled \
                   /etc/apt/sources.list.d/ceph.sources.disabled; do
            [ -f "$f" ] && mv "$f" "${f%.disabled}"
          done
        executable: /bin/bash
      changed_when: true
      failed_when: false
      tags: [restore, full-restore, clean]

    - name: Tear down stale bridges
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for br in $(ip -o link show type bridge | awk -F': ' '{print $2}'); do
            grep -q "auto $br" /etc/network/interfaces 2>/dev/null && continue
            ip link set "$br" down 2>/dev/null || true
            ip link delete "$br" 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true
      tags: [restore, full-restore, clean]

    - name: Restore host configuration from backup
      ansible.builtin.unarchive:
        src: "{{ manifest.host_config }}"
        dest: /
        remote_src: true
      tags: [restore, full-restore, clean]

    - name: Update initramfs
      ansible.builtin.command:
        cmd: update-initramfs -u -k all
      changed_when: true
      tags: [restore, full-restore, clean]

    - name: Reload WiFi kernel modules
      ansible.builtin.shell:
        cmd: |
          modprobe -r iwlmvm iwlwifi 2>/dev/null || true
          modprobe iwlwifi 2>/dev/null || true
        executable: /bin/bash
      changed_when: true
      failed_when: false
      tags: [restore, full-restore, clean]

    - name: Rescan PCI bus to restore original drivers
      ansible.builtin.shell:
        cmd: echo 1 > /sys/bus/pci/rescan
        executable: /bin/bash
      changed_when: true
      failed_when: false
      tags: [restore, full-restore, clean]

    - name: Bring up interfaces from restored config
      ansible.builtin.command:
        cmd: ifup --all --force
      changed_when: true
      failed_when: false
      tags: [restore, full-restore, clean]

    - name: Remove local state file from controller
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../.state/addresses.json"
        state: absent
      delegate_to: localhost
      tags: [restore, full-restore, clean]

    - name: Report restore result
      ansible.builtin.debug:
        msg: >-
          Restore complete.
          Host config: restored from {{ manifest.host_config }}.
          VMs backed up: {{ manifest.vm_ids | default([]) | join(', ') | default('none') }}.
      tags: [restore, full-restore, clean]

# ── LAN host cleanup (runs from router_nodes via SSH) ─────────────

- name: Clean up LAN satellite hosts
  hosts: router_nodes
  gather_facts: false
  tags: [restore, full-restore, clean]
  tasks:
    - name: Process each LAN host
      ansible.builtin.include_tasks: ../tasks/cleanup_lan_host.yml
      vars:
        _lan_host_ip: "{{ hostvars[item].ansible_host }}"
        _lan_host_name: "{{ item }}"
      loop: "{{ groups['lan_hosts'] | default([]) }}"
      when: groups['lan_hosts'] | default([]) | length > 0
