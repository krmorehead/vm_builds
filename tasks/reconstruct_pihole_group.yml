---
# Reusable task file: reconstruct the pihole dynamic group.
#
# Consumed by:
#   - Per-feature molecule converge.yml (pihole-lxc scenario)
#   - Per-feature molecule verify.yml
#   - playbooks/cleanup.yml (rollback plays)
#
# Must run on a host in the dns_nodes/proxmox group.
# Simpler than OpenWrt reconstruction: pct_remote is always the
# connection method (no SSH auth detection needed).

- name: Verify Pi-hole container is running
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      pct status {{ pihole_ct_id | default(102) }} | grep -c running
    executable: /bin/bash
  register: _pihole_ct_status
  changed_when: false
  failed_when: (_pihole_ct_status.stdout | trim | int) == 0

- name: Add Pi-hole containers to dynamic group
  ansible.builtin.add_host:
    name: "pihole-{{ item }}"
    groups: pihole
    ansible_connection: community.proxmox.proxmox_pct_remote
    ansible_host: "{{ hostvars[item].ansible_host }}"
    ansible_user: root
    proxmox_vmid: "{{ pihole_ct_id | default(102) }}"
    ansible_paramiko_host_key_checking: false
    ansible_paramiko_proxy_command: >-
      {{ 'ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p root@'
         + lookup('env', 'PRIMARY_HOST')
         if 'lan_hosts' in (hostvars[item].group_names | default([]))
         else omit }}
  loop: "{{ ansible_play_hosts }}"

- name: Report reconstructed pihole group
  ansible.builtin.debug:
    msg: >-
      Reconstructed pihole group: host=pihole-{{ inventory_hostname }},
      proxmox_host={{ ansible_host }},
      vmid={{ pihole_ct_id | default(102) }},
      connection=pct_remote
