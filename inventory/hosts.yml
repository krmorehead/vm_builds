---
all:
  children:
    proxmox:
      children:
        # Device flavors -- each child group determines which VM types
        # a host receives. A host can belong to multiple flavor groups.
        # Shared infrastructure (backup, bridges, PCI, iGPU) targets
        # "proxmox" and runs on every host regardless of flavor.
        router_nodes:
          hosts:
            home: {}
        vpn_nodes:
          hosts:
            home: {}
            mesh1: {}
            ai: {}
            mesh2: {}
        dns_nodes:
          hosts:
            home: {}
        wifi_nodes:
          hosts:
            home: {}
            mesh1: {}
            mesh2: {}
        monitoring_nodes:
          hosts:
            home: {}
        service_nodes:
          hosts:
            home: {}
        media_nodes:
          hosts:
            home: {}
        desktop_nodes:
          hosts:
            home: {}
        gaming_nodes:
          hosts: {}
        # LAN-reachable hosts -- behind the OpenWrt router, accessed via ProxyJump through the primary Proxmox host.
        lan_hosts:
          hosts:
            mesh1: {}

    # Dynamic groups -- populated at runtime by add_host in provision roles.
    # Keep these empty in the static inventory.
    openwrt:
      hosts: {}
    wireguard:
      hosts: {}
    pihole:
      hosts: {}
    openwrt_mesh:
      hosts: {}
    homeassistant:
      hosts: {}
    jellyfin:
      hosts: {}
    kodi:
      hosts: {}
    moonlight:
      hosts: {}
    desktop:
      hosts: {}
    kiosk:
      hosts: {}
    gaming:
      hosts: {}
    netdata:
      hosts: {}
    rsyslog:
      hosts: {}
