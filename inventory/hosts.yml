---
all:
  children:
    proxmox:
      children:
        # Device flavors -- each child group determines which VM types
        # a host receives. A host can belong to multiple flavor groups.
        # Shared infrastructure (backup, bridges, PCI) targets "proxmox"
        # and runs on every host regardless of flavor.
        router_nodes:
          hosts:
            home: {}
    # Dynamic groups -- populated at runtime by add_host in VM roles.
    # Keep these empty in the static inventory.
    openwrt:
      hosts: {}
