---
project_version: "1.2.0"

# ── Project paths ─────────────────────────────────────────────────
# Auto-detect project root: Molecule sets MOLECULE_PROJECT_DIRECTORY,
# production runs from playbooks/ (one level below root).
project_root: >-
  {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY')
     | default(playbook_dir + '/..', true) }}

# Generated secrets file: test.env.generated under Molecule,
# .env.generated in production.
env_generated_path: >-
  {{ project_root }}/{{
     'test.env.generated'
     if lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | length > 0
     else '.env.generated' }}

# ── Storage ───────────────────────────────────────────────────────
proxmox_storage: local-lvm

# ── LXC defaults ─────────────────────────────────────────────────
proxmox_lxc_default_template: debian-12-standard_12.12-1_amd64.tar.zst
proxmox_lxc_template_storage: local
proxmox_lxc_template_path: images/debian-12-standard_12.12-1_amd64.tar.zst

# ── OpenWrt LXC (mesh satellite nodes) ────────────────────────────
# Custom image built by build-images.sh: no firewall, WiFi drivers baked in.
# Run ./build-images.sh before first deploy.
openwrt_lxc_template: openwrt-mesh-lxc-24.10.0-x86-64-rootfs.tar.gz
openwrt_lxc_template_path: images/openwrt-mesh-lxc-24.10.0-x86-64-rootfs.tar.gz

# ── Pi-hole LXC ──────────────────────────────────────────────────
# Custom image built by build-images.sh: Debian 12 + Pi-hole pre-installed.
# Run ./build-images.sh before first deploy.
pihole_lxc_template: pihole-debian-12-amd64.tar.zst
pihole_lxc_template_path: images/pihole-debian-12-amd64.tar.zst
pihole_ct_ip_offset: 10

# ── rsyslog LXC ─────────────────────────────────────────────────
# Custom image built by build-images.sh: Debian 12 + rsyslog pre-configured
# for TCP log reception, spool directory, and logrotate.
# Run ./build-images.sh before first deploy.
rsyslog_lxc_template: rsyslog-debian-12-amd64.tar.zst
rsyslog_lxc_template_path: images/rsyslog-debian-12-amd64.tar.zst
rsyslog_ct_ip_offset: 12

# ── Netdata LXC ─────────────────────────────────────────────────
# Custom image built by build-images.sh: Debian 12 + Netdata pre-installed
# with dbengine retention, /host/proc and /host/sys paths pre-configured.
# Run ./build-images.sh before first deploy.
netdata_lxc_template: netdata-debian-12-amd64.tar.zst
netdata_lxc_template_path: images/netdata-debian-12-amd64.tar.zst
netdata_ct_ip_offset: 13

# ── OpenWrt Router (VM) ──────────────────────────────────────────
# Custom image built by build-images.sh: mesh/security/DNS packages baked in.
# Run ./build-images.sh before first deploy.
openwrt_image_path: images/openwrt-router-24.10.0-x86-64-combined.img.gz
openwrt_vm_id: 100
openwrt_vm_name: openwrt-router
openwrt_vm_memory: 512
openwrt_vm_cores: 2
openwrt_vm_disk_size: 512M

# ── WireGuard LXC ─────────────────────────────────────────────────
# Custom image built by build-images.sh: Debian 12 + wireguard-tools,
# iptables, iptables-persistent, sysctl ip_forward pre-configured.
# Run ./build-images.sh before first deploy.
wireguard_lxc_template: wireguard-debian-12-amd64.tar.zst
wireguard_lxc_template_path: images/wireguard-debian-12-amd64.tar.zst

# ── Network Tier (100-199) ───────────────────────────────────────
wireguard_ct_id: 101
pihole_ct_id: 102
meshwifi_ct_id: 103

# ── Service Tier (200-299) ───────────────────────────────────────
homeassistant_ct_id: 200

# ── Media Tier (300-399) ─────────────────────────────────────────
jellyfin_ct_id: 300
kodi_ct_id: 301
moonlight_ct_id: 302

# ── Desktop Tier (400-499) ───────────────────────────────────────
desktop_vm_id: 400
kiosk_ct_id: 401

# ── Observability Tier (500-599) ─────────────────────────────────
netdata_ct_id: 500
rsyslog_ct_id: 501

# ── Gaming (600-699) ─────────────────────────────────────────────
gaming_vm_id: 600

# ── Startup order ────────────────────────────────────────────────
# Maps VMID to Proxmox boot priority. Lower numbers start first.
# On-demand services use onboot: false (no startup order needed).
proxmox_startup_order:
  100: 1     # OpenWrt Router
  101: 2     # WireGuard VPN
  102: 3     # Pi-hole
  500: 3     # Netdata
  501: 3     # rsyslog
  103: 4     # Mesh WiFi Controller
  200: 5     # Home Assistant
  300: 5     # Jellyfin
  401: 6     # Custom UX Kiosk
  600: 1     # Gaming VM (auto-start on gaming rig)

# On-demand services (onboot: false, started manually)
proxmox_ondemand_services:
  - 301      # Kodi
  - 302      # Moonlight
  - 400      # Desktop VM
