---
# ── WAN and LAN interface detection ────────────────────────────

- name: Set WAN device from inventory
  ansible.builtin.set_fact:
    wan_device: "{{ openwrt_wan_device | default('eth0') }}"

- name: List all ethernet interfaces
  ansible.builtin.raw: ls -1 /sys/class/net/ | grep '^eth'
  register: all_eth
  changed_when: false

- name: Set LAN devices fact
  ansible.builtin.set_fact:
    lan_devices: "{{ all_eth.stdout_lines | difference([wan_device]) | sort }}"

- name: Fail if no LAN devices found
  ansible.builtin.fail:
    msg: "No LAN devices found after excluding WAN ({{ wan_device }})"
  when: lan_devices | length == 0

- name: Report detected network layout
  ansible.builtin.debug:
    msg: "WAN={{ wan_device }}, LAN={{ lan_devices | join(', ') }}"

# ── Auto-detect a non-colliding LAN subnet ───────────────────────

- name: Set upstream WAN prefix from inventory
  ansible.builtin.set_fact:
    _wan_prefix: "{{ upstream_wan_prefix }}"
  when:
    - openwrt_lan_auto_subnet | bool
    - upstream_wan_prefix | default('') | length > 0

- name: Select first LAN subnet that does not collide with WAN
  ansible.builtin.set_fact:
    _selected_lan: "{{ item }}"
  loop: "{{ openwrt_lan_subnet_candidates }}"
  when:
    - openwrt_lan_auto_subnet | bool
    - _selected_lan is not defined
    - _wan_prefix is defined
    - item.ip.split('.')[0:3] | join('.') != _wan_prefix

- name: Apply auto-selected LAN settings
  ansible.builtin.set_fact:
    openwrt_lan_ip: "{{ _selected_lan.ip }}"
    openwrt_lan_netmask: "{{ _selected_lan.netmask }}"
  when: _selected_lan is defined

# ── Phase 1: Configure WAN and LAN ports, restart for connectivity ──
# Keep LAN at default 192.168.1.1 so SSH stays alive through restart

- name: Set WAN interface device
  ansible.builtin.raw: uci set network.wan.device='{{ wan_device }}'

- name: Set WAN protocol
  ansible.builtin.raw: uci set network.wan.proto='dhcp'

- name: Set WAN6 device
  ansible.builtin.raw: uci set network.wan6.device='{{ wan_device }}'

- name: Set WAN6 protocol
  ansible.builtin.raw: uci set network.wan6.proto='dhcpv6'

- name: Clear existing LAN bridge port list
  ansible.builtin.raw: uci delete network.@device[0].ports 2>/dev/null; true
  changed_when: false

- name: Add each LAN port to the bridge
  ansible.builtin.raw: uci add_list network.@device[0].ports='{{ item }}'
  loop: "{{ lan_devices }}"

- name: Commit network changes (keeping LAN IP at default)
  ansible.builtin.raw: uci commit

- name: Schedule Phase 1 service restart via detached script
  ansible.builtin.raw: >-
    printf '#!/bin/sh\nsleep 1\n/etc/init.d/firewall restart\n'
    > /tmp/_restart_net.sh &&
    printf '/etc/init.d/dnsmasq restart\nsleep 2\n'
    >> /tmp/_restart_net.sh &&
    printf '/etc/init.d/network restart\nsleep 5\n'
    >> /tmp/_restart_net.sh &&
    printf '/etc/init.d/firewall restart\n/etc/init.d/dropbear restart\n'
    >> /tmp/_restart_net.sh &&
    printf 'rm -f /tmp/_restart_net.sh\n'
    >> /tmp/_restart_net.sh &&
    chmod +x /tmp/_restart_net.sh &&
    start-stop-daemon -S -b -x /tmp/_restart_net.sh
  ignore_unreachable: true
  changed_when: true

- name: Pause for services and network to stabilize
  ansible.builtin.pause:
    seconds: 30

- name: Remove bootstrap IP from WAN bridge on Proxmox
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      for br in $(ip -o addr show to {{ _bootstrap_ip }}/{{ _bootstrap_cidr }} \
        | awk '{print $2}'); do
        ip addr del {{ _bootstrap_ip }}/{{ _bootstrap_cidr }} dev "$br" 2>/dev/null || true
      done
    executable: /bin/bash
  delegate_to: "{{ _proxmox_host }}"
  failed_when: false
  changed_when: true

- name: Add bootstrap IP to LAN bridge on Proxmox
  ansible.builtin.command:
    cmd: >-
      ip addr add {{ _bootstrap_ip }}/{{ _bootstrap_cidr }}
      dev {{ _lan_bridge }}
  delegate_to: "{{ _proxmox_host }}"
  failed_when: false
  changed_when: true

- name: Wait for OpenWrt SSH on LAN bridge
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 22
    delay: 5
    timeout: 120
  delegate_to: "{{ _proxmox_host }}"

- name: Wait for WAN default route
  ansible.builtin.raw: ip -o route show default 2>/dev/null | head -1
  register: _wan_route
  changed_when: false
  retries: 30
  delay: 3
  until: _wan_route.stdout | default('') | trim | length > 0

- name: Restart firewall after network topology change
  ansible.builtin.raw: /etc/init.d/firewall restart
  changed_when: true

- name: Phase 1 diagnostics
  ansible.builtin.raw: |
    echo "wan_route=$(ip -o route show default | head -1)"
    echo "wan_ip=$(ip -4 addr show dev {{ wan_device }} 2>/dev/null | awk '/inet /{print $2}' | head -1)"
    echo "lan_ip=$(ip -4 addr show dev br-lan 2>/dev/null | awk '/inet /{print $2}' | head -1)"
    echo "dns=$(cat /tmp/resolv.conf.d/resolv.conf.auto 2>/dev/null | head -2)"
    echo "fw_status=$(/etc/init.d/firewall status 2>&1)"
    echo "dmesg_errors=$(dmesg | grep -i 'error\|segfault\|duplicate' | tail -3)"
  register: _phase1_diag
  changed_when: false
  failed_when: false

- name: Report Phase 1 network state
  ansible.builtin.debug:
    var: _phase1_diag.stdout_lines

# ── WiFi driver installation (needs WAN internet) ──────────────

- name: Switch opkg feeds to HTTP for SSL-less images
  ansible.builtin.raw: >-
    sed -i 's|https://|http://|g' /etc/opkg/distfeeds.conf
  changed_when: true
  when:
    - openwrt_mesh_enabled | bool
    - openwrt_wifi_driver_packages | default([]) | length > 0

- name: Update opkg package lists
  ansible.builtin.raw: opkg update
  register: _opkg_update
  changed_when: false
  retries: 3
  delay: 5
  until: _opkg_update.rc == 0
  when:
    - openwrt_mesh_enabled | bool
    - openwrt_wifi_driver_packages | default([]) | length > 0

- name: Install WiFi driver packages
  ansible.builtin.raw: opkg install {{ item }}
  loop: "{{ openwrt_wifi_driver_packages | default([]) }}"
  when:
    - openwrt_mesh_enabled | bool
    - openwrt_wifi_driver_packages | default([]) | length > 0

- name: Load WiFi kernel modules
  ansible.builtin.raw: >-
    for mod in iwlwifi ath9k ath10k_pci mt76; do
    modprobe "$mod" 2>/dev/null; done; sleep 3
  changed_when: true
  when:
    - openwrt_mesh_enabled | bool
    - openwrt_wifi_driver_packages | default([]) | length > 0

# ── 802.11s Mesh networking ────────────────────────────────────

- name: Detect WiFi radios
  ansible.builtin.raw: ls -1 /sys/class/ieee80211/ 2>/dev/null
  register: wifi_radios_raw
  changed_when: false
  failed_when: false
  when: openwrt_mesh_enabled | bool

- name: Set WiFi radio list
  ansible.builtin.set_fact:
    wifi_radios: "{{ wifi_radios_raw.stdout_lines | default([]) | select('match', '^phy') | list }}"
  when: openwrt_mesh_enabled | bool

- name: Remove default wpad packages
  ansible.builtin.raw: >-
    opkg list-installed | grep -q wpad-basic && opkg remove wpad-basic-wolfssl wpad-basic-openssl wpad-basic-mbedtls wpad-basic wpad-mini 2>/dev/null; true
  changed_when: false
  when:
    - openwrt_mesh_enabled | bool
    - wifi_radios | default([]) | length > 0

- name: Install wpad-mesh-openssl
  ansible.builtin.raw: opkg install wpad-mesh-openssl
  when:
    - openwrt_mesh_enabled | bool
    - wifi_radios | default([]) | length > 0

- name: Enable each WiFi radio
  ansible.builtin.raw: uci set wireless.radio{{ idx }}.disabled='0'
  loop: "{{ wifi_radios | default([]) }}"
  loop_control:
    index_var: idx
  when:
    - openwrt_mesh_enabled | bool
    - wifi_radios | default([]) | length > 0

- name: Set WiFi radio channel
  ansible.builtin.raw: >-
    uci set wireless.radio{{ idx }}.channel='{{ openwrt_mesh_channel }}'
  loop: "{{ wifi_radios | default([]) }}"
  loop_control:
    index_var: idx
  when:
    - openwrt_mesh_enabled | bool
    - wifi_radios | default([]) | length > 0
    - openwrt_mesh_channel != 'auto'

- name: Create mesh interface for each radio
  ansible.builtin.raw: |
    uci set wireless.mesh{{ idx }}=wifi-iface
    uci set wireless.mesh{{ idx }}.device='radio{{ idx }}'
    uci set wireless.mesh{{ idx }}.network='lan'
    uci set wireless.mesh{{ idx }}.mode='mesh'
    uci set wireless.mesh{{ idx }}.mesh_id='{{ openwrt_mesh_id }}'
    uci set wireless.mesh{{ idx }}.encryption='{{ openwrt_mesh_encryption }}'
    uci set wireless.mesh{{ idx }}.key='{{ openwrt_mesh_key }}'
    uci set wireless.mesh{{ idx }}.mesh_fwding='1'
    uci set wireless.mesh{{ idx }}.mesh_rssi_threshold='0'
  loop: "{{ wifi_radios | default([]) }}"
  loop_control:
    index_var: idx
  when:
    - openwrt_mesh_enabled | bool
    - wifi_radios | default([]) | length > 0

# ── Phase 2: Apply final LAN settings and restart ───────────────

- name: Set LAN IP address
  ansible.builtin.raw: uci set network.lan.ipaddr='{{ openwrt_lan_ip }}'

- name: Set LAN netmask
  ansible.builtin.raw: uci set network.lan.netmask='{{ openwrt_lan_netmask }}'

- name: Set DHCP start address offset
  ansible.builtin.raw: uci set dhcp.lan.start='{{ openwrt_dhcp_start }}'

- name: Set DHCP address pool size
  ansible.builtin.raw: uci set dhcp.lan.limit='{{ openwrt_dhcp_limit }}'

- name: Set DHCP lease time
  ansible.builtin.raw: uci set dhcp.lan.leasetime='{{ openwrt_dhcp_leasetime }}'

# ── DHCP reservation for Proxmox host LAN management IP ──────────
# The Proxmox host gets its LAN IP via DHCP from this VM on every boot.
# A static lease ensures it always gets the same predictable IP.

- name: Get Proxmox LAN bridge MAC address
  ansible.builtin.command:
    cmd: cat /sys/class/net/{{ _lan_bridge }}/address
  register: _lan_bridge_mac
  delegate_to: "{{ _proxmox_host }}"
  changed_when: false

- name: Compute Proxmox LAN management IP (for DHCP reservation)
  ansible.builtin.set_fact:
    _proxmox_lan_ip: "{{ openwrt_lan_ip.split('.')[0:3] | join('.') }}.{{ proxmox_lan_mgmt_ip_offset }}"

- name: Remove existing DHCP reservations for proxmox host
  ansible.builtin.raw: |
    while uci -q get dhcp.@host[-1] >/dev/null 2>&1; do
      name=$(uci -q get dhcp.@host[-1].name 2>/dev/null)
      mac=$(uci -q get dhcp.@host[-1].mac 2>/dev/null | tr 'A-F' 'a-f')
      target_mac=$(echo '{{ _lan_bridge_mac.stdout | trim }}' | tr 'A-F' 'a-f')
      if [ "$name" = "proxmox" ] || [ "$mac" = "$target_mac" ]; then
        uci delete dhcp.@host[-1]
      else
        break
      fi
    done
  changed_when: false

- name: Add DHCP static lease for Proxmox host
  ansible.builtin.raw: |
    uci add dhcp host
    uci set dhcp.@host[-1].name='proxmox'
    uci set dhcp.@host[-1].mac='{{ _lan_bridge_mac.stdout | trim }}'
    uci set dhcp.@host[-1].ip='{{ _proxmox_lan_ip | trim }}'
  changed_when: true

- name: Remove stale deferred MAC file from previous runs
  ansible.builtin.raw: rm -f /etc/openwrt_wan_mac_deferred
  changed_when: false

- name: Check for WAN MAC conflict on L2 segment
  ansible.builtin.raw: |
    mac="{{ openwrt_wan_mac | lower }}"
    wan_dev="{{ wan_device }}"
    conflict="no"
    reason=""
    # Check 1: exact MAC in /proc/net/arp
    if awk -v m="$mac" 'tolower($4)==m{found=1} END{exit !found}' /proc/net/arp 2>/dev/null; then
      conflict="yes"
      reason="exact MAC found in ARP table"
    fi
    # Check 2: derive EUI-64 and check IPv6 neighbor table for SLAAC collision
    b1=$(echo "$mac" | cut -d: -f1)
    b2=$(echo "$mac" | cut -d: -f2)
    b3=$(echo "$mac" | cut -d: -f3)
    b4=$(echo "$mac" | cut -d: -f4)
    b5=$(echo "$mac" | cut -d: -f5)
    b6=$(echo "$mac" | cut -d: -f6)
    b1f=$(printf '%02x' $((0x$b1 ^ 2)))
    eui="${b1f}${b2}:${b3}ff:fe${b4}:${b5}${b6}"
    if ip -6 neigh 2>/dev/null | grep -qi "$eui"; then
      conflict="yes"
      reason="EUI-64 $eui found in IPv6 neighbor table"
    fi
    # Check 3: gateway MAC shares OUI with cloned MAC (same-device indicator)
    gw_ip=$(ip route show default 2>/dev/null | awk '/^default/{print $3}' | head -1)
    if [ -n "$gw_ip" ]; then
      ping -c 1 -W 2 "$gw_ip" >/dev/null 2>&1 || true
      sleep 1
      gw_mac=$(awk -v ip="$gw_ip" '$1==ip{print tolower($4)}' /proc/net/arp | head -1)
      cloned_oui=$(echo "$mac" | cut -d: -f1-3)
      gw_oui=$(echo "$gw_mac" | cut -d: -f1-3)
      if [ -n "$gw_oui" ] && [ "$cloned_oui" = "$gw_oui" ]; then
        conflict="yes"
        reason="gateway $gw_ip MAC $gw_mac shares OUI $gw_oui with cloned MAC"
      fi
    fi
    echo "conflict=$conflict"
    echo "reason=$reason"
  register: _mac_conflict_check
  changed_when: false
  when: openwrt_wan_mac | default('') | length > 0

- name: Set MAC conflict fact
  ansible.builtin.set_fact:
    _wan_mac_conflict: "{{ 'conflict=yes' in (_mac_conflict_check.stdout | default('')) }}"
  when: openwrt_wan_mac | default('') | length > 0

- name: Report MAC conflict detection result
  ansible.builtin.debug:
    msg: >-
      {{ _mac_conflict_check.stdout_lines | default([]) | join(' | ') }}
  when: openwrt_wan_mac | default('') | length > 0

- name: Save deferred WAN MAC to file (conflict detected)
  ansible.builtin.raw: >-
    echo '{{ openwrt_wan_mac }}' > /etc/openwrt_wan_mac_deferred &&
    chmod 644 /etc/openwrt_wan_mac_deferred
  when:
    - openwrt_wan_mac | default('') | length > 0
    - _wan_mac_conflict | default(false) | bool

- name: Deploy WAN MAC auto-apply init script
  ansible.builtin.raw: |
    cat > /etc/init.d/wan_mac_apply << 'INITEOF'
    #!/bin/sh /etc/rc.common
    START=99

    start() {
        local deferred="/etc/openwrt_wan_mac_deferred"
        [ -f "$deferred" ] || return 0

        local mac=$(cat "$deferred" | tr -d ' \t\n\r')
        [ -n "$mac" ] || return 0

        local wan_dev=$(uci get network.wan.device 2>/dev/null || echo "eth0")

        local tries=0
        while [ $tries -lt 30 ]; do
            ip route show default 2>/dev/null | grep -q default && break
            sleep 2
            tries=$((tries + 1))
        done
        local conflict="no"
        local mac_lower=$(echo "$mac" | tr 'A-F' 'a-f')
        if awk -v m="$mac_lower" 'tolower($4)==m{found=1} END{exit !found}' /proc/net/arp 2>/dev/null; then
            conflict="yes"
        fi
        local b1=$(echo "$mac_lower" | cut -d: -f1)
        local b2=$(echo "$mac_lower" | cut -d: -f2)
        local b3=$(echo "$mac_lower" | cut -d: -f3)
        local b4=$(echo "$mac_lower" | cut -d: -f4)
        local b5=$(echo "$mac_lower" | cut -d: -f5)
        local b6=$(echo "$mac_lower" | cut -d: -f6)
        local b1f=$(printf '%02x' $((0x$b1 ^ 2)))
        local eui="${b1f}${b2}:${b3}ff:fe${b4}:${b5}${b6}"
        if ip -6 neigh 2>/dev/null | grep -qi "$eui"; then
            conflict="yes"
        fi
        local gw_ip=$(ip route show default 2>/dev/null | awk '/^default/{print $3}' | head -1)
        if [ -n "$gw_ip" ]; then
            ping -c 1 -W 2 "$gw_ip" >/dev/null 2>&1
            local gw_mac=$(awk -v ip="$gw_ip" '$1==ip{print tolower($4)}' /proc/net/arp | head -1)
            local cloned_oui=$(echo "$mac_lower" | cut -d: -f1-3)
            local gw_oui=$(echo "$gw_mac" | cut -d: -f1-3)
            if [ -n "$gw_oui" ] && [ "$cloned_oui" = "$gw_oui" ]; then
                conflict="yes"
            fi
        fi

        if [ "$conflict" = "no" ]; then
            logger -t wan_mac_apply "No conflict for MAC $mac - applying and restarting network"
            uci set network.wan.macaddr="$mac"
            uci commit network
            rm -f "$deferred"
            /etc/init.d/network restart
        else
            logger -t wan_mac_apply "Conflict still present for MAC $mac - keeping deferred"
        fi
    }
    INITEOF
    chmod +x /etc/init.d/wan_mac_apply
    /etc/init.d/wan_mac_apply enable
  when:
    - openwrt_wan_mac | default('') | length > 0
    - _wan_mac_conflict | default(false) | bool

- name: Report WAN MAC deferred
  ansible.builtin.debug:
    msg: >-
      WAN MAC {{ openwrt_wan_mac }} conflicts with a device on the WAN segment.
      Saved to /etc/openwrt_wan_mac_deferred. The MAC will be applied
      automatically on the next boot/restart once the conflicting device
      is removed.
  when:
    - openwrt_wan_mac | default('') | length > 0
    - _wan_mac_conflict | default(false) | bool

- name: Clone WAN MAC address
  ansible.builtin.raw: uci set network.wan.macaddr='{{ openwrt_wan_mac }}'
  when:
    - openwrt_wan_mac | default('') | length > 0
    - not (_wan_mac_conflict | default(false) | bool)

- name: Commit all final changes
  ansible.builtin.raw: uci commit

- name: Schedule final service restart via detached script
  ansible.builtin.raw: >-
    printf '#!/bin/sh\nsleep 1\n/etc/init.d/firewall restart\n'
    > /tmp/_restart_net.sh &&
    printf '/etc/init.d/dnsmasq restart\nsleep 2\n'
    >> /tmp/_restart_net.sh &&
    printf '/etc/init.d/network restart\nsleep 5\n'
    >> /tmp/_restart_net.sh &&
    printf '/etc/init.d/firewall restart\n/etc/init.d/dropbear restart\n'
    >> /tmp/_restart_net.sh &&
    printf 'rm -f /tmp/_restart_net.sh\n'
    >> /tmp/_restart_net.sh &&
    chmod +x /tmp/_restart_net.sh &&
    start-stop-daemon -S -b -x /tmp/_restart_net.sh
  ignore_unreachable: true
  changed_when: true

- name: Pause for services and network to restart
  ansible.builtin.pause:
    seconds: 30

- name: Clean up bootstrap IP from LAN bridge
  ansible.builtin.command:
    cmd: >-
      ip addr del {{ _bootstrap_ip }}/{{ _bootstrap_cidr }}
      dev {{ _lan_bridge }}
  delegate_to: "{{ _proxmox_host }}"
  failed_when: false
  changed_when: true

# ── Proxmox LAN management IP ──────────────────────────────────
# Add the management IP immediately so the GUI is reachable this
# session. Upgrade the LAN bridge to DHCP so it auto-acquires on boot.

- name: Set Proxmox LAN CIDR
  ansible.builtin.set_fact:
    _proxmox_lan_cidr: "{{ _netmask_cidr_map[openwrt_lan_netmask] | default('24') }}"

- name: Check if Proxmox LAN IP is already present
  ansible.builtin.command:
    cmd: ip addr show dev {{ _lan_bridge }}
  register: _lan_bridge_addr
  delegate_to: "{{ _proxmox_host }}"
  changed_when: false

- name: Remove conflicting LAN-subnet IPs from non-LAN bridges
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      prefix=$(echo "{{ _proxmox_lan_ip | trim }}" | cut -d. -f1-3)
      for br in $(ip -o link show type bridge | awk -F': ' '{print $2}'); do
        [ "$br" = "{{ _lan_bridge }}" ] && continue
        ip -o -4 addr show dev "$br" 2>/dev/null | awk '{print $4}' |
        while read cidr; do
          ip_part=$(echo "$cidr" | cut -d/ -f1)
          if echo "$ip_part" | grep -q "^${prefix}\."; then
            ip addr del "$cidr" dev "$br" 2>/dev/null
            echo "removed $cidr from $br"
          fi
        done
      done
    executable: /bin/bash
  delegate_to: "{{ _proxmox_host }}"
  changed_when: false
  failed_when: false

- name: Remove stale temp LAN config files
  ansible.builtin.file:
    path: /etc/network/interfaces.d/ansible-temp-lan.conf
    state: absent
  delegate_to: "{{ _proxmox_host }}"

- name: Add Proxmox management IP to LAN bridge
  ansible.builtin.command:
    cmd: >-
      ip addr add {{ _proxmox_lan_ip | trim }}/{{ _proxmox_lan_cidr }}
      dev {{ _lan_bridge }}
  delegate_to: "{{ _proxmox_host }}"
  when: _proxmox_lan_ip | trim not in _lan_bridge_addr.stdout

- name: Ensure interfaces.d is sourced on Proxmox host
  ansible.builtin.lineinfile:
    path: /etc/network/interfaces
    line: "source /etc/network/interfaces.d/*"
    state: present
  delegate_to: "{{ _proxmox_host }}"

- name: Upgrade LAN bridge to DHCP in ansible-bridges.conf
  ansible.builtin.replace:
    path: /etc/network/interfaces.d/ansible-bridges.conf
    regexp: "^(iface {{ _lan_bridge }} inet) manual$"
    replace: "\\1 dhcp"
  delegate_to: "{{ _proxmox_host }}"

- name: Remove separate LAN management config if it exists
  ansible.builtin.file:
    path: /etc/network/interfaces.d/ansible-proxmox-lan.conf
    state: absent
  delegate_to: "{{ _proxmox_host }}"

# ── Host address state file (for build.py auto-detection) ──────
# Records both the original management IP and the LAN IP so the
# next run can find the Proxmox host regardless of cable topology.

- name: Ensure local .state directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../.state"
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: Write host addresses to local state file
  ansible.builtin.copy:
    content: >-
      {{ {"host": _proxmox_host,
          "ips": [hostvars[_proxmox_host].ansible_host, _proxmox_lan_ip]}
         | to_nice_json }}
    dest: "{{ playbook_dir }}/../.state/addresses.json"
    mode: "0644"
  delegate_to: localhost

# ── Mid-run connection update ───────────────────────────────────
# If the original management IP is no longer reachable from the
# controller (primary router topology), switch to the LAN IP so
# Play 4 (cleanup) can still connect.

- name: Probe original Proxmox management IP from controller
  ansible.builtin.wait_for:
    host: "{{ hostvars[_proxmox_host].ansible_host }}"
    port: 22
    timeout: 5
  register: _mgmt_probe
  failed_when: false
  delegate_to: localhost

- name: Update Proxmox connection to LAN IP if management unreachable
  ansible.builtin.add_host:
    name: "{{ _proxmox_host }}"
    groups: proxmox
    ansible_host: "{{ _proxmox_lan_ip }}"
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
  when: _mgmt_probe is failed

- name: Report connection update
  ansible.builtin.debug:
    msg: >-
      Proxmox connection switched to LAN IP {{ _proxmox_lan_ip }}
      (original {{ hostvars[_proxmox_host].ansible_host }} unreachable)
  when: _mgmt_probe is failed

# ── Final diagnostics and report ──────────────────────────────

- name: Final build diagnostics
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo "vm_status=$(qm status 100 2>&1)"
      echo "vm_onboot=$(qm config 100 2>/dev/null | grep -oP 'onboot: \K.*')"
      echo "vm_startup=$(qm config 100 2>/dev/null | grep -oP 'startup: \K.*')"
      echo "lan_bridge_ip=$(ip -4 addr show dev {{ _lan_bridge }} | grep -oP 'inet \K[^/]+')"
      echo "lan_bridge_dhcp=$(grep -c 'inet dhcp' /etc/network/interfaces.d/ansible-bridges.conf 2>/dev/null || echo 0)"
    executable: /bin/bash
  delegate_to: "{{ _proxmox_host }}"
  register: _final_diag
  changed_when: false
  failed_when: false

- name: Report final build state
  ansible.builtin.debug:
    msg: >-
      OpenWrt LAN={{ openwrt_lan_ip }}/{{ openwrt_lan_netmask }}
      WAN={{ wan_device }} prefix={{ _wan_prefix | default('unknown') }}
      WiFi={{ wifi_radios | default([]) | length }} radios
      MAC={{ openwrt_wan_mac | default('auto') }}
      Proxmox GUI={{ _proxmox_lan_ip }}
      | {{ _final_diag.stdout_lines | default([]) | join(' | ') }}
  ignore_unreachable: true
