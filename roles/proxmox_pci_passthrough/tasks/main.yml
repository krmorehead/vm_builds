---
# ── Detect WiFi PCIe devices ──────────────────────────────────

- name: Find network interfaces with wireless capability
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      for iface in /sys/class/net/*/wireless; do
        [ -e "$iface" ] && basename "$(dirname "$iface")"
      done
    executable: /bin/bash
  register: wifi_ifaces_raw
  changed_when: false
  failed_when: false

- name: Set WiFi interface list
  ansible.builtin.set_fact:
    wifi_ifaces: "{{ wifi_ifaces_raw.stdout_lines | default([]) }}"

- name: Resolve PCI address for each WiFi interface
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      readlink -f /sys/class/net/{{ item }}/device | grep -oP '[0-9a-f]{2}:[0-9a-f]{2}\.[0-9a-f]' | tail -1
    executable: /bin/bash
  loop: "{{ wifi_ifaces }}"
  register: wifi_pci_raw
  changed_when: false
  when: wifi_ifaces | length > 0

- name: Build WiFi PCI device list
  ansible.builtin.set_fact:
    wifi_pci_devices: >-
      {{ wifi_pci_raw.results | default([])
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('trim')
         | select('match', '.+')
         | list }}

- name: Detect WiFi kernel driver for each device
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      basename "$(readlink -f /sys/class/net/{{ item }}/device/driver)"
    executable: /bin/bash
  loop: "{{ wifi_ifaces }}"
  register: wifi_driver_raw
  changed_when: false
  when: wifi_ifaces | length > 0

- name: Build auto-detected driver blacklist
  ansible.builtin.set_fact:
    _auto_driver_blacklist: >-
      {{ wifi_driver_raw.results | default([])
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('trim')
         | select('match', '.+')
         | unique | list }}
  when: wifi_driver_blacklist | length == 0

- name: Set effective driver blacklist
  ansible.builtin.set_fact:
    _effective_blacklist: >-
      {{ wifi_driver_blacklist if wifi_driver_blacklist | length > 0
         else _auto_driver_blacklist | default([]) }}

- name: Skip remaining tasks when no WiFi devices found
  ansible.builtin.debug:
    msg: "No WiFi PCIe devices detected on this host. Skipping PCI passthrough."
  when: wifi_pci_devices | length == 0

- name: Skip vfio binding on non-router hosts (WiFi used via PHY namespace move)
  ansible.builtin.debug:
    msg: >-
      WiFi detected ({{ wifi_pci_devices | join(', ') }}) but host is not in
      router_nodes. Skipping PCIe passthrough — WiFi will be available for
      LXC PHY namespace move.
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' not in group_names"

# ── Clean stale vfio bindings on non-router hosts ─────────────
# A previous run may have bound WiFi to vfio-pci when this host was
# in router_nodes (or before the role skipped non-router hosts).
# Unbind and restore the original driver so WiFi PHY is available.

- name: Check for stale vfio-pci config on non-router host
  ansible.builtin.stat:
    path: /etc/modprobe.d/vfio-pci.conf
  register: _stale_vfio_conf
  when: "'router_nodes' not in group_names"

- name: Clean stale vfio-pci bindings on non-router host
  when:
    - "'router_nodes' not in group_names"
    - _stale_vfio_conf.stat.exists | default(false)
  block:
    - name: Remove stale WiFi driver blacklist
      ansible.builtin.file:
        path: /etc/modprobe.d/blacklist-wifi.conf
        state: absent

    - name: Remove stale vfio-pci config
      ansible.builtin.file:
        path: /etc/modprobe.d/vfio-pci.conf
        state: absent

    - name: Unbind WiFi devices from vfio-pci
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for dev in /sys/bus/pci/drivers/vfio-pci/0000:*; do
            [ -e "$dev" ] && echo "$(basename $dev)" > /sys/bus/pci/drivers/vfio-pci/unbind 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true

    - name: Reload common WiFi kernel modules
      ansible.builtin.shell:
        cmd: |
          for mod in iwlwifi ath9k ath10k_pci mt76 mt7921e rtw88_pci rtw89_pci; do
            modprobe "$mod" 2>/dev/null || true
          done
          sleep 2
        executable: /bin/bash
      changed_when: true

    - name: Rescan PCI bus after vfio cleanup
      ansible.builtin.shell:
        cmd: echo 1 > /sys/bus/pci/rescan
      changed_when: true

    - name: Update initramfs after removing stale vfio config
      ansible.builtin.command:
        cmd: update-initramfs -u -k all
      changed_when: true

# ── IOMMU setup (router_nodes only) ──────────────────────────
# Non-router hosts with WiFi skip IOMMU/vfio entirely. Their WiFi
# stays on the host driver for PHY namespace move into LXC containers.

- name: Check if IOMMU is active
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      dmesg | grep -i -c 'IOMMU enabled\|DMAR.*IOMMU\|Adding to iommu group'
    executable: /bin/bash
  register: iommu_check
  changed_when: false
  failed_when: false
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

- name: Set IOMMU status fact
  ansible.builtin.set_fact:
    iommu_active: "{{ (iommu_check.stdout | default('0') | int) > 0 }}"
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

- name: Detect CPU vendor for IOMMU parameter
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -m1 'vendor_id' /proc/cpuinfo | awk '{print $3}'
    executable: /bin/bash
  register: cpu_vendor
  changed_when: false
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool

- name: Set IOMMU kernel parameter
  ansible.builtin.set_fact:
    _iommu_param: "{{ 'intel_iommu=on' if 'Intel' in cpu_vendor.stdout | default('') else 'amd_iommu=on' }}"
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool

- name: Add IOMMU to GRUB cmdline
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet {{ _iommu_param }} iommu=pt"'
    backup: true
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool
  notify: Update grub

- name: Ensure VFIO modules are loaded at boot
  ansible.builtin.lineinfile:
    path: /etc/modules
    line: "{{ item }}"
    state: present
  loop:
    - vfio
    - vfio_iommu_type1
    - vfio_pci
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool
  notify: Update initramfs

- name: Flush handlers before potential reboot
  ansible.builtin.meta: flush_handlers
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool

- name: Fail if reboot is needed but not allowed
  ansible.builtin.fail:
    msg: >-
      IOMMU is not active and a reboot is required to enable it.
      Re-run with -e pci_passthrough_allow_reboot=true or reboot
      the Proxmox node manually and re-run.
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool
    - not pci_passthrough_allow_reboot | bool

- name: Reboot Proxmox to activate IOMMU
  ansible.builtin.reboot:
    reboot_timeout: 300
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool
    - pci_passthrough_allow_reboot | bool

- name: Re-check IOMMU status after reboot
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      find /sys/kernel/iommu_groups/ -maxdepth 1 -mindepth 1 -type d 2>/dev/null | wc -l
    executable: /bin/bash
  register: iommu_recheck
  changed_when: false
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool
    - pci_passthrough_allow_reboot | bool

- name: Update IOMMU status after reboot
  ansible.builtin.set_fact:
    iommu_active: "{{ (iommu_recheck.stdout | default('0') | int) > 0 }}"
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - iommu_recheck is not skipped

- name: Fail if IOMMU is still not active after reboot
  ansible.builtin.fail:
    msg: >-
      IOMMU is not active after reboot on {{ inventory_hostname }}. WiFi PCI
      passthrough requires VT-d (Intel) or AMD-Vi enabled in BIOS/UEFI.
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not iommu_active | bool

# ── IOMMU group isolation check (router_nodes only) ──────────

- name: Read IOMMU group for each WiFi device
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      basename "$(readlink -f /sys/bus/pci/devices/0000:{{ item }}/iommu_group)"
    executable: /bin/bash
  loop: "{{ wifi_pci_devices }}"
  register: wifi_iommu_groups
  changed_when: false
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

- name: Validate IOMMU group assignments are numeric
  ansible.builtin.set_fact:
    _iommu_groups_valid: >-
      {{ wifi_iommu_groups.results | default([])
         | map(attribute='stdout')
         | map('trim')
         | reject('match', '^\d+$')
         | list | length == 0 }}
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

- name: Fail if IOMMU groups are not properly assigned
  ansible.builtin.fail:
    msg: >-
      WiFi device IOMMU groups resolved to non-numeric values
      ({{ wifi_iommu_groups.results | map(attribute='stdout') | map('trim') | join(', ') }})
      on {{ inventory_hostname }}. IOMMU is enabled but devices are not properly
      grouped. Check BIOS ACS settings or try adding
      pcie_acs_override=downstream,multifunction to GRUB_CMDLINE_LINUX_DEFAULT.
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - not (_iommu_groups_valid | default(false) | bool)

- name: Count devices in each IOMMU group
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ls -1 /sys/kernel/iommu_groups/{{ item.stdout | trim }}/devices/ | wc -l
    executable: /bin/bash
  loop: "{{ wifi_iommu_groups.results | default([]) }}"
  register: iommu_group_sizes
  changed_when: false
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

- name: Fail if any WiFi device shares an IOMMU group with other devices
  ansible.builtin.fail:
    msg: >-
      WiFi device {{ item.item.item }} is in IOMMU group
      {{ item.item.stdout | trim }} which contains
      {{ item.stdout | trim }} device(s). PCI passthrough requires
      the WiFi card to be in its own IOMMU group. Check BIOS settings
      or try adding pcie_acs_override=downstream,multifunction to
      GRUB_CMDLINE_LINUX_DEFAULT.
  loop: "{{ iommu_group_sizes.results | default([]) }}"
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
    - (item.stdout | default('0') | trim | int) > 1

# ── Bind vfio-pci (router_nodes only) ────────────────────────

- name: Blacklist WiFi drivers on the host
  ansible.builtin.template:
    src: blacklist-wifi.conf.j2
    dest: /etc/modprobe.d/blacklist-wifi.conf
    owner: root
    group: root
    mode: "0644"
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
  notify: Update initramfs

- name: Get vendor and device IDs for WiFi cards
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      lspci -n -s {{ item }} | awk '{print $3}'
    executable: /bin/bash
  loop: "{{ wifi_pci_devices }}"
  register: wifi_vd_ids
  changed_when: false
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

- name: Configure vfio-pci device binding
  ansible.builtin.template:
    src: vfio-pci.conf.j2
    dest: /etc/modprobe.d/vfio-pci.conf
    owner: root
    group: root
    mode: "0644"
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"
  notify: Update initramfs

- name: Flush handlers after vfio configuration
  ansible.builtin.meta: flush_handlers
  when:
    - wifi_pci_devices | length > 0
    - "'router_nodes' in group_names"

# ── Export WiFi fact (all hosts) ──────────────────────────────

- name: Export WiFi PCI devices as cacheable fact
  ansible.builtin.set_fact:
    wifi_pci_devices: "{{ wifi_pci_devices }}"
    cacheable: true
