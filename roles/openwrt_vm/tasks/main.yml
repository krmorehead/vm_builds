---
- name: Check if OpenWrt VM already exists
  ansible.builtin.command:
    cmd: qm status {{ openwrt_vm_id }}
  register: vm_status
  failed_when: false
  changed_when: false

- name: Set VM existence flag
  ansible.builtin.set_fact:
    vm_exists: "{{ vm_status.rc == 0 }}"

# ── Verify custom image exists ─────────────────────────────────────

- name: Resolve OpenWrt image source path
  ansible.builtin.set_fact:
    _openwrt_image_src: >-
      {{ openwrt_image_path
         if openwrt_image_path.startswith('/')
         else (project_root + '/' + openwrt_image_path) }}
  when: not vm_exists | bool

- name: Check OpenWrt image exists
  ansible.builtin.stat:
    path: "{{ _openwrt_image_src }}"
  register: _openwrt_image_stat
  delegate_to: localhost
  when: not vm_exists | bool

- name: Fail if OpenWrt image is missing
  ansible.builtin.fail:
    msg: >-
      OpenWrt image not found: {{ openwrt_image_path }}.
      Run ./build-images.sh to build it.
  when:
    - not vm_exists | bool
    - not (_openwrt_image_stat.stat.exists | default(false))

# ── Image upload & VM creation ───────────────────────────────────

- name: Set upload destination path
  ansible.builtin.set_fact:
    _openwrt_tmp_upload: "{{ openwrt_tmp_image_dir }}/{{ _openwrt_image_src | basename }}"
  when: not vm_exists | bool

- name: Upload OpenWrt image to Proxmox node
  ansible.builtin.copy:
    src: "{{ _openwrt_image_src }}"
    dest: "{{ _openwrt_tmp_upload }}"
    mode: "0644"
  when: not vm_exists | bool

- name: Decompress gzip image on Proxmox node
  ansible.builtin.command:
    cmd: gunzip -f {{ _openwrt_tmp_upload }}
  register: _gunzip_result
  failed_when:
    - _gunzip_result.rc != 0
    - "'decompression OK' not in (_gunzip_result.stderr | default(''))"
  when:
    - not vm_exists | bool
    - _openwrt_image_src.endswith('.gz')

- name: Set final image path after optional decompression
  ansible.builtin.set_fact:
    _openwrt_disk_image: >-
      {{ _openwrt_tmp_upload | regex_replace('\.gz$', '')
         if _openwrt_image_src.endswith('.gz')
         else _openwrt_tmp_upload }}
  when: not vm_exists | bool

- name: Create OpenWrt VM shell (no disk)
  community.proxmox.proxmox_kvm:
    node: "{{ proxmox_node }}"
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    vmid: "{{ openwrt_vm_id }}"
    name: "{{ openwrt_vm_name }}"
    memory: "{{ openwrt_vm_memory }}"
    cores: "{{ openwrt_vm_cores }}"
    ostype: l26
    machine: "{{ 'q35' if (wifi_pci_devices | default([]) | length > 0) else omit }}"
    scsihw: virtio-scsi-pci
    serial:
      serial0: socket
    state: present
  delegate_to: localhost
  when: not vm_exists | bool

# ── Disk import ──────────────────────────────────────────────────

- name: Import disk image into VM storage
  ansible.builtin.command:
    cmd: >-
      qm importdisk {{ openwrt_vm_id }}
      {{ _openwrt_disk_image }}
      {{ proxmox_storage }}
  register: disk_import
  when: not vm_exists | bool

- name: Parse imported disk path
  ansible.builtin.set_fact:
    imported_disk: >-
      {{ disk_import.stdout
         | regex_search("imported disk '([^']+)'", '\1')
         | first }}
  when: not vm_exists | bool

- name: Attach disk and configure boot order
  ansible.builtin.command:
    cmd: >-
      qm set {{ openwrt_vm_id }}
      --scsi0 {{ imported_disk }}
      --boot order=scsi0
  when: not vm_exists | bool

- name: Resize boot disk
  ansible.builtin.command:
    cmd: >-
      qm resize {{ openwrt_vm_id }}
      scsi0 {{ openwrt_vm_disk_size }}
  when: not vm_exists | bool

# ── Bridge ordering (WAN first) ─────────────────────────────────

- name: Resolve WAN bridge
  ansible.builtin.set_fact:
    _wan_bridge: >-
      {{ openwrt_wan_bridge
         | default(proxmox_wan_bridge | default(''), true)
         | default(proxmox_all_bridges | first, true) }}

- name: Build ordered bridge list (WAN first, then LAN)
  ansible.builtin.set_fact:
    _ordered_bridges: >-
      {{ [_wan_bridge] + (proxmox_all_bridges | difference([_wan_bridge]) | sort) }}

- name: Report bridge ordering
  ansible.builtin.debug:
    msg: >-
      WAN bridge={{ _wan_bridge }} (net0/eth0),
      ordered={{ _ordered_bridges | join(', ') }}

# ── NIC attachment ───────────────────────────────────────────────

- name: Attach NIC to each bridge
  ansible.builtin.command:
    cmd: >-
      qm set {{ openwrt_vm_id }}
      --net{{ idx }}
      virtio,bridge={{ bridge }}
  loop: "{{ _ordered_bridges }}"
  loop_control:
    index_var: idx
    loop_var: bridge
  when: not vm_exists | bool

# ── Auto-start on Proxmox boot ──────────────────────────────────

- name: Configure VM to start on boot
  ansible.builtin.command:
    cmd: >-
      qm set {{ openwrt_vm_id }}
      --onboot 1
      --startup order={{ openwrt_vm_startup_order }}

# ── WiFi PCIe passthrough ──────────────────────────────────────

- name: Attach WiFi PCIe devices to VM
  ansible.builtin.command:
    cmd: >-
      qm set {{ openwrt_vm_id }}
      --hostpci{{ idx }} {{ pci_addr }},pcie=1
  loop: "{{ wifi_pci_devices | default([]) }}"
  loop_control:
    index_var: idx
    loop_var: pci_addr
  when:
    - not vm_exists | bool
    - wifi_pci_devices | default([]) | length > 0

- name: Clean up uploaded image
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ _openwrt_tmp_upload | default('') }}"
    - "{{ _openwrt_disk_image | default('') }}"
  when: item | length > 0

# ── Start VM ─────────────────────────────────────────────────────

- name: Start OpenWrt VM
  community.proxmox.proxmox_kvm:
    node: "{{ proxmox_node }}"
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    vmid: "{{ openwrt_vm_id }}"
    state: started
  delegate_to: localhost

# ── Bootstrap connectivity to OpenWrt LAN ────────────────────────

- name: Select LAN-side bridge for bootstrap
  ansible.builtin.set_fact:
    _bootstrap_bridge: >-
      {{ openwrt_bootstrap_bridge
         | default(_wan_bridge, true) }}
    cacheable: true

- name: Check if bootstrap IP is already present
  ansible.builtin.command:
    cmd: ip addr show dev {{ _bootstrap_bridge }}
  register: bridge_addr
  changed_when: false

- name: Add temporary IP to LAN bridge
  ansible.builtin.command:
    cmd: >-
      ip addr add
      {{ openwrt_bootstrap_ip }}/{{ openwrt_bootstrap_cidr }}
      dev {{ _bootstrap_bridge }}
  when: "openwrt_bootstrap_ip not in bridge_addr.stdout"

- name: Wait for OpenWrt SSH on LAN interface
  ansible.builtin.wait_for:
    host: "{{ openwrt_bootstrap_gw }}"
    port: 22
    delay: 15
    timeout: 180

- name: Bootstrap diagnostics
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo "vm_status=$(qm status {{ openwrt_vm_id }} 2>&1)"
      echo "bootstrap_bridge={{ _bootstrap_bridge }}"
      echo "bootstrap_ip=$(ip -4 addr show dev {{ _bootstrap_bridge }} | grep -oP 'inet \K[^ ]+')"
      echo "bridges={{ _ordered_bridges | join(',') }}"
      echo "wan_bridge={{ _wan_bridge }}"
      echo "dmesg_errors=$(dmesg | grep -iE 'duplicate|segfault|error.*eth' | tail -3)"
    executable: /bin/bash
  register: _boot_diag
  changed_when: false
  failed_when: false

- name: Report bootstrap state
  ansible.builtin.debug:
    var: _boot_diag.stdout_lines

- name: Detect upstream gateway IP for LAN subnet selection
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      ip route show default | awk '{print $3}' | head -1
    executable: /bin/bash
  register: _gw_for_prefix
  changed_when: false

- name: Compute upstream network prefix from gateway IP
  ansible.builtin.set_fact:
    _upstream_prefix: "{{ (_gw_for_prefix.stdout | default('') | trim).split('.')[0:3] | join('.') }}"
  when: (_gw_for_prefix.stdout | default('') | trim) | length > 0

- name: Add OpenWrt VM to dynamic inventory
  ansible.builtin.add_host:
    name: "{{ openwrt_vm_name }}"
    groups: openwrt
    ansible_host: "{{ openwrt_bootstrap_gw }}"
    ansible_user: root
    ansible_ssh_pass: ""
    ansible_ssh_common_args: >-
      -o ProxyJump=root@{{ ansible_host }}
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o PubkeyAuthentication=no
      -o ConnectTimeout=10
      -o ServerAliveInterval=15
      -o ServerAliveCountMax=4
    openwrt_wan_device: eth0
    openwrt_wan_mac: "{{ openwrt_wan_mac | default('') }}"
    upstream_wan_prefix: "{{ _upstream_prefix }}"
    _proxmox_host: "{{ inventory_hostname }}"
    _wan_bridge: "{{ _wan_bridge }}"
    _lan_bridge: "{{ _ordered_bridges[1] | default(_ordered_bridges[0]) }}"
    _lan_bridges: "{{ _ordered_bridges[1:] }}"
    _bootstrap_ip: "{{ openwrt_bootstrap_ip }}"
    _bootstrap_cidr: "{{ openwrt_bootstrap_cidr }}"
