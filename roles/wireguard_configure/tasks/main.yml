---
# ── Key generation (when WIREGUARD_PRIVATE_KEY is empty) ────────

- name: Check if key generation is needed
  ansible.builtin.set_fact:
    _wg_needs_keygen: "{{ wireguard_private_key | length == 0 }}"

- name: Generate client private key
  ansible.builtin.command:
    cmd: wg genkey
  register: _wg_client_privkey
  changed_when: true
  when: _wg_needs_keygen | bool

- name: Derive client public key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo "{{ _wg_client_privkey.stdout }}" | wg pubkey
    executable: /bin/bash
  register: _wg_client_pubkey
  changed_when: false
  when: _wg_needs_keygen | bool

- name: Generate dummy server keypair for config validity
  ansible.builtin.command:
    cmd: wg genkey
  register: _wg_dummy_server_privkey
  changed_when: false
  when:
    - _wg_needs_keygen | bool
    - wireguard_server_public_key | length == 0

- name: Derive dummy server public key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      echo "{{ _wg_dummy_server_privkey.stdout }}" | wg pubkey
    executable: /bin/bash
  register: _wg_dummy_server_pubkey
  changed_when: false
  when:
    - _wg_needs_keygen | bool
    - wireguard_server_public_key | length == 0

- name: Set generated key facts
  ansible.builtin.set_fact:
    _wg_private_key: "{{ _wg_client_privkey.stdout }}"
    _wg_public_key: "{{ _wg_client_pubkey.stdout }}"
    _wg_server_pubkey: >-
      {{ wireguard_server_public_key
         if wireguard_server_public_key | length > 0
         else _wg_dummy_server_pubkey.stdout }}
  when: _wg_needs_keygen | bool

- name: Set provided key facts
  ansible.builtin.set_fact:
    _wg_private_key: "{{ wireguard_private_key }}"
    _wg_server_pubkey: "{{ wireguard_server_public_key }}"
  when: not (_wg_needs_keygen | bool)

- name: Write generated keys to env.generated on controller
  ansible.builtin.blockinfile:
    path: "{{ env_generated_path }}"
    create: true
    mode: "0600"
    marker: "# {mark} WireGuard (auto-generated)"
    block: |
      WIREGUARD_PRIVATE_KEY={{ _wg_private_key }}
      WIREGUARD_PUBLIC_KEY={{ _wg_public_key }}
      WIREGUARD_CLIENT_ADDRESS={{ wireguard_client_address }}
      WIREGUARD_SERVER_PUBLIC_KEY={{ _wg_server_pubkey }}
      WIREGUARD_SERVER_ENDPOINT={{ wireguard_server_endpoint }}
      WIREGUARD_ALLOWED_IPS={{ wireguard_allowed_ips }}
  delegate_to: localhost
  when: _wg_needs_keygen | bool

# ── WireGuard configuration ────────────────────────────────────

- name: Template wg0 configuration
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: "0600"

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started

# ── IP forwarding ──────────────────────────────────────────────

- name: Apply sysctl settings
  ansible.builtin.command:
    cmd: sysctl -p /etc/sysctl.d/99-wireguard.conf
  changed_when: true

# ── NAT (MASQUERADE on wg0) ───────────────────────────────────

- name: Check if MASQUERADE rule exists
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      iptables -t nat -C POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null && echo present || echo absent
    executable: /bin/bash
  register: _nat_check
  changed_when: false

- name: Add MASQUERADE rule
  ansible.builtin.command:
    cmd: iptables -t nat -A POSTROUTING -o wg0 -j MASQUERADE
  when: "'absent' in _nat_check.stdout"
  changed_when: true

- name: Save iptables rules
  ansible.builtin.command:
    cmd: netfilter-persistent save
  changed_when: true
