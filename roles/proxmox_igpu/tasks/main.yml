---
# Detect iGPU (Intel or AMD), ensure the driver is loaded, verify
# VA-API, and export facts for LXC containers (bind mount) and VMs
# (hostpci passthrough).
#
# Fails if no iGPU is detected — every host in this project is
# expected to have one.
# Deliberately separate from proxmox_pci_passthrough: the iGPU stays
# on the host driver (i915/amdgpu, shared) rather than being bound
# to vfio-pci (exclusive).

# ── Detection ─────────────────────────────────────────────────────

- name: Detect Intel VGA controller via lspci
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      lspci -nn | grep -i 'VGA compatible controller.*Intel' | head -1
    executable: /bin/bash
  register: _intel_igpu_lspci
  changed_when: false
  failed_when: false

- name: Detect AMD VGA controller via lspci
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      lspci -nn | grep -iE 'VGA compatible controller.*(AMD|ATI)|Display controller.*(AMD|ATI)' | head -1
    executable: /bin/bash
  register: _amd_igpu_lspci
  changed_when: false
  failed_when: false

- name: Set iGPU vendor and availability
  ansible.builtin.set_fact:
    igpu_available: >-
      {{ (_intel_igpu_lspci.rc == 0 and _intel_igpu_lspci.stdout | length > 0)
         or (_amd_igpu_lspci.rc == 0 and _amd_igpu_lspci.stdout | length > 0) }}
    igpu_vendor: >-
      {{ 'intel' if (_intel_igpu_lspci.rc == 0 and _intel_igpu_lspci.stdout | length > 0)
         else ('amd' if (_amd_igpu_lspci.rc == 0 and _amd_igpu_lspci.stdout | length > 0)
         else 'none') }}

- name: Fail if no iGPU detected
  ansible.builtin.fail:
    msg: >-
      No iGPU found on {{ inventory_hostname }}. Every Proxmox host
      in this project is expected to have an Intel or AMD iGPU for
      VA-API transcoding and LXC GPU access.
  when: not (igpu_available | bool)

- name: Set iGPU lspci output reference
  ansible.builtin.set_fact:
    _igpu_lspci_stdout: >-
      {{ _intel_igpu_lspci.stdout if igpu_vendor == 'intel'
         else _amd_igpu_lspci.stdout }}

- name: Extract iGPU PCI address
  ansible.builtin.set_fact:
    igpu_pci_address: >-
      {{ _igpu_lspci_stdout.split(' ')[0] | default('') }}
  when: igpu_available | bool

# ── Vendor-specific driver names ──────────────────────────────────

- name: Set vendor-specific driver and package facts
  ansible.builtin.set_fact:
    _igpu_driver: "{{ 'i915' if igpu_vendor == 'intel' else 'amdgpu' }}"
    _igpu_vaapi_packages: >-
      {{ ['vainfo', 'intel-media-va-driver'] if igpu_vendor == 'intel'
         else ['vainfo', 'mesa-va-drivers'] }}
    _igpu_libva_driver: "{{ 'iHD' if igpu_vendor == 'intel' else 'radeonsi' }}"

# ── Ensure GPU driver is loaded ───────────────────────────────────

- name: Check GPU driver is loaded
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      lsmod | grep -c '^{{ _igpu_driver }}'
    executable: /bin/bash
  register: _gpu_driver_check
  changed_when: false
  failed_when: false
  when: igpu_available | bool

- name: Remove any driver blacklist entries
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -rl 'blacklist {{ _igpu_driver }}' /etc/modprobe.d/ 2>/dev/null | \
        xargs -r sed -i '/blacklist {{ _igpu_driver }}/d'
    executable: /bin/bash
  changed_when: true
  failed_when: false
  when:
    - igpu_available | bool
    - _gpu_driver_check.rc != 0

- name: Load GPU kernel module
  community.general.modprobe:
    name: "{{ _igpu_driver }}"
    state: present
  when:
    - igpu_available | bool
    - _gpu_driver_check.rc != 0

- name: Wait for DRI devices to appear after driver load
  ansible.builtin.wait_for:
    path: /dev/dri/renderD128
    timeout: 10
  when:
    - igpu_available | bool
    - _gpu_driver_check.rc != 0

# ── Device node detection (dynamic, not hardcoded) ────────────────

- name: Find render device
  ansible.builtin.stat:
    path: /dev/dri/renderD128
  register: _render_stat
  when: igpu_available | bool

- name: Find card device by matching GPU driver
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      for card in /dev/dri/card*; do
        [ -e "$card" ] || continue
        num=$(basename "$card" | sed 's/card//')
        driver=$(readlink -f "/sys/class/drm/card${num}/device/driver" \
                 2>/dev/null | xargs basename 2>/dev/null)
        if [ "$driver" = "{{ _igpu_driver }}" ]; then
          echo "$card"
          exit 0
        fi
      done
      exit 1
    executable: /bin/bash
  register: _card_detect
  changed_when: false
  failed_when: false
  when: igpu_available | bool

- name: Set device path facts
  ansible.builtin.set_fact:
    igpu_render_device: >-
      {{ '/dev/dri/renderD128'
      if (_render_stat.stat.exists | default(false)) else '' }}
    igpu_card_device: >-
      {{ _card_detect.stdout | default('') | trim }}
  when: igpu_available | bool

- name: Assert iGPU devices are present
  ansible.builtin.assert:
    that:
      - igpu_render_device | length > 0
      - igpu_card_device | length > 0
    fail_msg: >-
      iGPU detected at {{ igpu_pci_address }} and {{ _igpu_driver }} loaded,
      but DRI devices are missing.
      render={{ igpu_render_device }},
      card={{ igpu_card_device }}.
      Check dmesg for {{ _igpu_driver }} errors.
  when: igpu_available | bool

# ── Render and video group GIDs ───────────────────────────────────

- name: Read render group GID
  ansible.builtin.command:
    cmd: getent group render
  register: _render_group
  changed_when: false
  failed_when: false
  when: igpu_available | bool

- name: Read video group GID
  ansible.builtin.command:
    cmd: getent group video
  register: _video_group
  changed_when: false
  failed_when: false
  when: igpu_available | bool

- name: Set group GID facts
  ansible.builtin.set_fact:
    igpu_render_gid: >-
      {{ _render_group.stdout.split(':')[2] | default('')
      if _render_group.rc == 0 else '' }}
    igpu_video_gid: >-
      {{ _video_group.stdout.split(':')[2] | default('')
      if _video_group.rc == 0 else '' }}
  when: igpu_available | bool

# ── DNS check (apt needs working DNS) ─────────────────────────────

- name: Check DNS resolution
  ansible.builtin.command:
    cmd: getent hosts deb.debian.org
  register: _dns_check
  changed_when: false
  failed_when: false
  when: igpu_available | bool

- name: Add fallback DNS if resolution fails
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: "0644"
    content: |
      nameserver {{ ansible_default_ipv4.gateway | default('8.8.8.8') }}
      nameserver 8.8.8.8
      nameserver 1.1.1.1
  when:
    - igpu_available | bool
    - _dns_check.rc != 0

# ── Proxmox repo management (needed for vainfo install) ──────────

- name: Disable PVE enterprise repo (requires subscription)
  ansible.builtin.command:
    cmd: mv /etc/apt/sources.list.d/pve-enterprise.sources /etc/apt/sources.list.d/pve-enterprise.sources.disabled
  args:
    removes: /etc/apt/sources.list.d/pve-enterprise.sources
  when: igpu_available | bool

- name: Disable Ceph enterprise repo (requires subscription)
  ansible.builtin.command:
    cmd: mv /etc/apt/sources.list.d/ceph.sources /etc/apt/sources.list.d/ceph.sources.disabled
  args:
    removes: /etc/apt/sources.list.d/ceph.sources
  when: igpu_available | bool

- name: Add Proxmox no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_facts['distribution_release'] }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  when: igpu_available | bool

- name: Verify enterprise repos are disabled
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      ls /etc/apt/sources.list.d/pve-enterprise.sources 2>/dev/null && exit 1
      ls /etc/apt/sources.list.d/ceph.sources 2>/dev/null && exit 1
      ls /etc/apt/sources.list.d/pve-no-subscription.sources >/dev/null
    executable: /bin/bash
  changed_when: false
  when: igpu_available | bool

# ── Sync system clock before apt operations ───────────────────────
# Clock skew causes GPG signature verification to fail ("Not live
# until" errors). Force NTP sync before any apt cache update.

- name: Check clock skew against apt GPG signatures
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      skew=$(chronyc -n tracking 2>/dev/null | awk '/System time/{print $4}' || echo "999")
      echo "$skew"
    executable: /bin/bash
  register: _clock_skew
  changed_when: false
  failed_when: false
  when: igpu_available | bool

- name: Force NTP time sync
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      synced=false

      if command -v chronyc >/dev/null 2>&1; then
        systemctl restart chronyd 2>/dev/null || true
        chronyc -a 'burst 4/4' 2>/dev/null || true
        sleep 6
        chronyc -a makestep 2>/dev/null && synced=true
      fi

      if [ "$synced" = false ] && command -v ntpdate >/dev/null 2>&1; then
        ntpdate -b pool.ntp.org 2>/dev/null && synced=true
      fi

      if [ "$synced" = false ] && command -v timedatectl >/dev/null 2>&1; then
        timedatectl set-ntp true 2>/dev/null || true
        sleep 5
        synced=true
      fi

      if [ "$synced" = false ]; then
        http_date=$(wget -qS --spider http://google.com/ 2>&1 | grep -i '^ *Date:' | head -1 | sed 's/^ *[Dd]ate: //')
        if [ -n "$http_date" ]; then
          date -s "$http_date" 2>/dev/null && synced=true
        fi
      fi

      echo "Clock after sync: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
    executable: /bin/bash
  register: _clock_sync
  changed_when: false
  failed_when: false
  when:
    - igpu_available | bool
    - (_clock_skew.stdout | default('999') | float) > 30.0

- name: Display clock sync result
  ansible.builtin.debug:
    msg: "{{ _clock_sync.stdout | default('skipped — clock skew < 30s') }}"
  when: igpu_available | bool

# ── VA-API verification ──────────────────────────────────────────

- name: Install VA-API packages
  ansible.builtin.apt:
    name: "{{ _igpu_vaapi_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 86400
  when: igpu_available | bool

- name: Run vainfo to verify VA-API
  ansible.builtin.command:
    cmd: vainfo
  register: _vainfo
  changed_when: false
  failed_when: false
  when: igpu_available | bool
  environment:
    DISPLAY: ""
    LIBVA_DRIVER_NAME: "{{ _igpu_libva_driver }}"

- name: Display vainfo output
  ansible.builtin.debug:
    var: _vainfo.stdout_lines
  when:
    - igpu_available | bool
    - _vainfo.rc == 0

- name: Warn if vainfo failed
  ansible.builtin.debug:
    msg: >-
      WARNING: vainfo failed (rc={{ _vainfo.rc }}).
      VA-API transcoding may not be available.
      stderr: {{ _vainfo.stderr | default('') }}
  when:
    - igpu_available | bool
    - _vainfo.rc != 0

# ── Set empty facts when iGPU is absent ───────────────────────────

- name: Set empty iGPU facts when not available
  ansible.builtin.set_fact:
    igpu_pci_address: ""
    igpu_render_device: ""
    igpu_card_device: ""
    igpu_render_gid: ""
    igpu_video_gid: ""
    igpu_vendor: "none"
  when: not igpu_available | bool

# ── Summary ───────────────────────────────────────────────────────

- name: Display iGPU detection summary
  ansible.builtin.debug:
    msg: |
      iGPU Detection Summary:
        available:     {{ igpu_available }}
        vendor:        {{ igpu_vendor }}
        pci_address:   {{ igpu_pci_address }}
        render_device: {{ igpu_render_device }}
        card_device:   {{ igpu_card_device }}
        render_gid:    {{ igpu_render_gid }}
        video_gid:     {{ igpu_video_gid }}
        driver:        {{ _igpu_driver | default('n/a') }}
        vainfo_ok:     {{ (_vainfo.rc | default(1)) == 0 }}
