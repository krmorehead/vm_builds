---
- name: Reconstruct pihole dynamic group
  hosts: dns_nodes
  gather_facts: false
  tasks:
    - name: Include group reconstruction
      ansible.builtin.include_tasks: ../../tasks/reconstruct_pihole_group.yml

- name: Verify Pi-hole LXC container
  hosts: dns_nodes
  gather_facts: false
  vars:
    pihole_ct_id: 102
  tasks:
    # ── Container state ──────────────────────────────────────────

    - name: Check container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ pihole_ct_id }} | grep -c running
        executable: /bin/bash
      register: _pihole_running
      changed_when: false

    - name: Assert container is running
      ansible.builtin.assert:
        that: (_pihole_running.stdout | trim | int) > 0
        fail_msg: "Container {{ pihole_ct_id }} is not running"

    # ── Container config (single read) ───────────────────────────

    - name: Read container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ pihole_ct_id }}
      register: _pihole_cfg
      changed_when: false

    - name: Assert onboot is enabled
      ansible.builtin.assert:
        that: "'onboot: 1' in _pihole_cfg.stdout"
        fail_msg: "Container {{ pihole_ct_id }} missing onboot: 1"

    - name: Assert startup order is 3
      ansible.builtin.assert:
        that: _pihole_cfg.stdout is regex('startup:.*order=3')
        fail_msg: "Container {{ pihole_ct_id }} missing startup order=3"

    - name: Assert nesting is enabled
      ansible.builtin.assert:
        that: "'nesting=1' in _pihole_cfg.stdout"
        fail_msg: "Container {{ pihole_ct_id }} missing nesting=1"

    # ── Pi-hole health checks (batched single pct exec) ──────────

    - name: Run Pi-hole container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ pihole_ct_id }} -- /bin/sh -c '
          echo "FTL=$(/usr/local/bin/pihole status 2>/dev/null | head -3)";
          echo "WEB=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/admin/ 2>/dev/null)";
          echo "DHCP=$(/usr/bin/pihole-FTL --config dhcp.active 2>/dev/null)"
          '
      register: _pihole_health
      changed_when: false

    - name: Assert FTL is active
      ansible.builtin.assert:
        that: "'FTL' in _pihole_health.stdout or 'Enabled' in _pihole_health.stdout or 'Active' in _pihole_health.stdout"
        fail_msg: "Pi-hole FTL not active"

    - name: Parse web admin status
      ansible.builtin.set_fact:
        _pihole_web_code: "{{ _pihole_health.stdout | regex_search('WEB=(\\d+)', '\\1') | first }}"

    - name: Assert web admin returns 200 or 301
      ansible.builtin.assert:
        that: _pihole_web_code in ['200', '301']
        fail_msg: "Web admin HTTP status: {{ _pihole_web_code }}, expected 200 or 301"

    # ── DNS resolution ───────────────────────────────────────────

    - name: Wait for FTL to listen on port 53
      ansible.builtin.command:
        cmd: pct exec {{ pihole_ct_id }} -- /bin/sh -c 'ss -tlnp | grep -q :53'
      register: _ftl_listen
      changed_when: false
      retries: 6
      delay: 5
      until: _ftl_listen.rc == 0

    - name: Test DNS query through Pi-hole
      ansible.builtin.command:
        cmd: pct exec {{ pihole_ct_id }} -- dig @127.0.0.1 google.com +short +time=5
      register: _pihole_dns
      changed_when: false
      retries: 5
      delay: 10
      until: _pihole_dns.rc == 0 and (_pihole_dns.stdout | trim | length > 0)

    - name: Assert DNS resolves
      ansible.builtin.assert:
        that: _pihole_dns.stdout | trim | length > 0
        fail_msg: "DNS resolution failed: {{ _pihole_dns.stdout }}"

    # ── Ad blocking ──────────────────────────────────────────────

    - name: Test known ad domain is blocked
      ansible.builtin.command:
        cmd: pct exec {{ pihole_ct_id }} -- dig @127.0.0.1 doubleclick.net +short +time=5
      register: _pihole_adblock
      changed_when: false
      failed_when: false

    - name: Report ad blocking result
      ansible.builtin.debug:
        msg: "Ad block test (doubleclick.net): {{ _pihole_adblock.stdout | default('no response') | trim }}"

    - name: Assert DHCP is disabled
      ansible.builtin.assert:
        that: "'false' in _pihole_health.stdout"
        fail_msg: "DHCP is active in Pi-hole — should be disabled"

    # ── Report ───────────────────────────────────────────────────

    - name: Report Pi-hole verification
      ansible.builtin.debug:
        msg: >-
          Pi-hole per-feature verify passed:
          ct={{ pihole_ct_id }}, running=yes,
          web={{ _pihole_web_code }},
          dns={{ 'working' if _pihole_dns.stdout | trim | length > 0 else 'failed' }}
