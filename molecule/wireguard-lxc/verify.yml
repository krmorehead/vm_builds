---
- name: Reconstruct wireguard dynamic group
  hosts: vpn_nodes
  gather_facts: false
  tasks:
    - name: Include group reconstruction
      ansible.builtin.include_tasks: ../../tasks/reconstruct_wireguard_group.yml

- name: Verify WireGuard LXC container
  hosts: vpn_nodes
  gather_facts: false
  vars:
    wireguard_ct_id: 101
  tasks:
    - name: Check container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ wireguard_ct_id }} | grep -c running
        executable: /bin/bash
      register: _wg_running
      changed_when: false

    - name: Assert container is running
      ansible.builtin.assert:
        that: (_wg_running.stdout | trim | int) > 0
        fail_msg: "Container {{ wireguard_ct_id }} is not running"

    - name: Read container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ wireguard_ct_id }}
      register: _wg_cfg
      changed_when: false

    - name: Assert onboot is enabled
      ansible.builtin.assert:
        that: "'onboot: 1' in _wg_cfg.stdout"
        fail_msg: "Container {{ wireguard_ct_id }} missing onboot: 1"

    - name: Assert nesting is enabled
      ansible.builtin.assert:
        that: "'nesting=1' in _wg_cfg.stdout"
        fail_msg: "Container {{ wireguard_ct_id }} missing nesting=1"

    - name: Check wireguard module loaded on host
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lsmod | grep -c '^wireguard'
        executable: /bin/bash
      register: _wg_mod
      changed_when: false

    - name: Assert wireguard module loaded
      ansible.builtin.assert:
        that: (_wg_mod.stdout | trim | int) > 0
        fail_msg: "wireguard kernel module not loaded"

    - name: Run WireGuard container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ wireguard_ct_id }} -- /bin/sh -c '
          echo "IFACE=$(ip link show wg0 >/dev/null 2>&1 && echo ok || echo missing)";
          echo "SVC=$(systemctl is-enabled wg-quick@wg0 2>/dev/null || echo unknown)";
          echo "IPFWD=$(sysctl -n net.ipv4.ip_forward 2>/dev/null || echo 0)";
          echo "NAT=$(iptables -t nat -C POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null && echo present || echo missing)"
          '
      register: _wg_health
      changed_when: false

    - name: Assert wg0 exists
      ansible.builtin.assert:
        that: "'IFACE=ok' in _wg_health.stdout"
        fail_msg: "wg0 interface missing in container"

    - name: Assert service is enabled
      ansible.builtin.assert:
        that: "'SVC=enabled' in _wg_health.stdout"
        fail_msg: "wg-quick@wg0 not enabled"

    - name: Assert IP forwarding enabled
      ansible.builtin.assert:
        that: "'IPFWD=1' in _wg_health.stdout"
        fail_msg: "IP forwarding disabled"

    - name: Assert MASQUERADE present
      ansible.builtin.assert:
        that: "'NAT=present' in _wg_health.stdout"
        fail_msg: "MASQUERADE missing"

    - name: Report per-feature verification
      ansible.builtin.debug:
        msg: >-
          WireGuard per-feature verify passed:
          ct={{ wireguard_ct_id }}, running=yes,
          wg0={{ 'up' if 'IFACE=ok' in _wg_health.stdout else 'missing' }},
          fwd={{ 'enabled' if 'IPFWD=1' in _wg_health.stdout else 'disabled' }},
          nat={{ 'present' if 'NAT=present' in _wg_health.stdout else 'absent' }}
