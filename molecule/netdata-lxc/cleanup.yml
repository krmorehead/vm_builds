---
- name: Destroy Netdata container
  hosts: monitoring_nodes
  gather_facts: false
  tasks:
    - name: Stop Netdata container
      ansible.builtin.command:
        cmd: pct stop {{ netdata_ct_id }}
      failed_when: false
      changed_when: true

    - name: Wait for container to stop
      ansible.builtin.pause:
        seconds: 2

    - name: Destroy Netdata container
      ansible.builtin.command:
        cmd: pct destroy {{ netdata_ct_id }} --purge
      failed_when: false
      changed_when: true
