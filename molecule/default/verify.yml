---
# ── Play 1: Common infrastructure (all Proxmox hosts) ────────────

- name: Verify common Proxmox infrastructure
  hosts: proxmox
  gather_facts: false
  tasks:
    # ── Bridge discovery ──────────────────────────────────────────

    - name: List physical-NIC-backed bridges
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for br in /sys/class/net/vmbr*/; do
            brname=$(basename "$br")
            for iface in $(ls "$br/brif/" 2>/dev/null); do
              if [ -e "/sys/class/net/$iface/device" ]; then
                echo "$brname"
                break
              fi
            done
          done
        executable: /bin/bash
      register: bridge_list
      changed_when: false

    - name: Assert at least one physical bridge exists
      ansible.builtin.assert:
        that: bridge_list.stdout_lines | length >= 1
        fail_msg: >-
          Expected at least 1 physical-NIC bridge, found
          {{ bridge_list.stdout_lines | length }}

    # ── IOMMU ─────────────────────────────────────────────────────

    - name: Check IOMMU status
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          dmesg | grep -i -c 'IOMMU enabled\|DMAR.*IOMMU\|Adding to iommu group'
        executable: /bin/bash
      register: iommu_verify
      changed_when: false
      failed_when: false

    - name: Report IOMMU status
      ansible.builtin.debug:
        msg: >-
          IOMMU {{ 'active' if (iommu_verify.stdout | int) > 0
          else 'not active (no WiFi passthrough)' }}

    # ── iGPU detection (Intel or AMD) ──────────────────────────────

    - name: Check for Intel iGPU
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lspci -nn | grep -ic 'VGA compatible controller.*Intel'
        executable: /bin/bash
      register: _intel_igpu_count
      changed_when: false
      failed_when: false

    - name: Check for AMD iGPU
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lspci -nn | grep -icE 'VGA compatible controller.*(AMD|ATI)|Display controller.*(AMD|ATI)'
        executable: /bin/bash
      register: _amd_igpu_count
      changed_when: false
      failed_when: false

    - name: Set iGPU vendor fact for verify
      ansible.builtin.set_fact:
        _verify_igpu_vendor: >-
          {{ 'intel' if (_intel_igpu_count.stdout | trim | int) > 0
             else ('amd' if (_amd_igpu_count.stdout | trim | int) > 0
             else 'none') }}
        _verify_igpu_present: >-
          {{ (_intel_igpu_count.stdout | trim | int) > 0
             or (_amd_igpu_count.stdout | trim | int) > 0 }}

    - name: Assert an iGPU is present
      ansible.builtin.assert:
        that: _verify_igpu_present | bool
        fail_msg: "No iGPU (Intel or AMD) found on {{ inventory_hostname }}"

    - name: Verify GPU driver loaded (Intel i915)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lsmod | grep -c '^i915'
        executable: /bin/bash
      register: _i915_loaded
      changed_when: false
      when: _verify_igpu_vendor == 'intel'

    - name: Assert i915 is loaded
      ansible.builtin.assert:
        that: (_i915_loaded.stdout | trim | int) > 0
        fail_msg: "Intel iGPU detected but i915 driver is not loaded"
      when: _verify_igpu_vendor == 'intel'

    - name: Verify GPU driver loaded (AMD amdgpu)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lsmod | grep -c '^amdgpu'
        executable: /bin/bash
      register: _amdgpu_loaded
      changed_when: false
      when: _verify_igpu_vendor == 'amd'

    - name: Assert amdgpu is loaded
      ansible.builtin.assert:
        that: (_amdgpu_loaded.stdout | trim | int) > 0
        fail_msg: "AMD iGPU detected but amdgpu driver is not loaded"
      when: _verify_igpu_vendor == 'amd'

    - name: Verify render device exists
      ansible.builtin.stat:
        path: /dev/dri/renderD128
      register: render_dev
      when: _verify_igpu_present | bool

    - name: Assert render device exists
      ansible.builtin.assert:
        that: render_dev.stat.exists
        fail_msg: "/dev/dri/renderD128 missing despite iGPU and loaded driver"
      when: _verify_igpu_present | bool

    - name: Verify vainfo is installed
      ansible.builtin.command:
        cmd: which vainfo
      changed_when: false
      when: _verify_igpu_present | bool

    - name: Verify enterprise repos are disabled
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/pve-enterprise.sources
      register: enterprise_repo

    - name: Assert enterprise repo is disabled
      ansible.builtin.assert:
        that: not enterprise_repo.stat.exists
        fail_msg: "pve-enterprise.sources still active"

    - name: Report iGPU status
      ansible.builtin.debug:
        msg: >-
          iGPU: vendor={{ _verify_igpu_vendor }},
          {{ 'driver loaded, vainfo installed'
          if _verify_igpu_present | bool
          else 'not detected' }}

    # ── Backup manifest ────────────────────────────────────────

    - name: Check backup manifest exists
      ansible.builtin.stat:
        path: /var/lib/ansible-backup/manifest.json
      register: backup_manifest

    - name: Assert backup manifest was created
      ansible.builtin.assert:
        that: backup_manifest.stat.exists
        fail_msg: "Backup manifest not found at /var/lib/ansible-backup/manifest.json"

    - name: Read backup manifest
      ansible.builtin.slurp:
        src: /var/lib/ansible-backup/manifest.json
      register: backup_manifest_raw

    - name: Parse backup manifest
      ansible.builtin.set_fact:
        backup_data: "{{ backup_manifest_raw.content | b64decode | from_json }}"

    - name: Assert backup manifest has required fields
      ansible.builtin.assert:
        that:
          - backup_data.timestamp is defined
          - backup_data.project_version is defined
          - backup_data.host is defined
          - backup_data.host_config is defined
        fail_msg: >-
          Backup manifest missing required fields.
          Contents: {{ backup_data }}

    - name: Check host config archive exists
      ansible.builtin.stat:
        path: "{{ backup_data.host_config }}"
      register: host_config_archive

    - name: Assert host config archive exists
      ansible.builtin.assert:
        that: host_config_archive.stat.exists
        fail_msg: >-
          Host config archive {{ backup_data.host_config }} referenced
          in manifest but not found on disk

    - name: Report backup status
      ansible.builtin.debug:
        msg: >-
          Backup: timestamp={{ backup_data.timestamp }},
          host={{ backup_data.host }},
          VMs={{ backup_data.vm_ids | default([]) | join(', ') | default('none') }},
          archive={{ backup_data.host_config }}

    # ── Deployment tracking ─────────────────────────────────────

    - name: Check deploy_stamp fact file exists
      ansible.builtin.stat:
        path: /etc/ansible/facts.d/vm_builds.fact
      register: stamp_file

    - name: Assert deploy_stamp was written
      ansible.builtin.assert:
        that: stamp_file.stat.exists
        fail_msg: "/etc/ansible/facts.d/vm_builds.fact not found"

    - name: Read deploy_stamp fact file
      ansible.builtin.slurp:
        src: /etc/ansible/facts.d/vm_builds.fact
      register: stamp_raw

    - name: Parse deploy_stamp
      ansible.builtin.set_fact:
        stamp: "{{ stamp_raw.content | b64decode | from_json }}"

    - name: Assert stamp contains project_version
      ansible.builtin.assert:
        that: stamp.project_version is defined
        fail_msg: "deploy_stamp missing project_version"

    - name: Assert stamp contains common plays
      ansible.builtin.assert:
        that:
          - "'backup' in stamp.plays"
          - "'infrastructure' in stamp.plays"
        fail_msg: "deploy_stamp missing common play entries: {{ stamp.plays.keys() | list }}"

    - name: Assert stamp contains openwrt_vm (router nodes only)
      ansible.builtin.assert:
        that: "'openwrt_vm' in stamp.plays"
        fail_msg: "deploy_stamp missing openwrt_vm entry: {{ stamp.plays.keys() | list }}"
      when: "'router_nodes' in group_names"

    - name: Assert stamp contains wireguard_lxc (vpn nodes only)
      ansible.builtin.assert:
        that: "'wireguard_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing wireguard_lxc entry: {{ stamp.plays.keys() | list }}"
      when: "'vpn_nodes' in group_names"

    - name: Assert stamp contains pihole_lxc (dns nodes only)
      ansible.builtin.assert:
        that: "'pihole_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing pihole_lxc entry: {{ stamp.plays.keys() | list }}"
      when: "'dns_nodes' in group_names"

    - name: Assert stamp contains rsyslog_lxc (monitoring nodes only)
      ansible.builtin.assert:
        that: "'rsyslog_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing rsyslog_lxc entry: {{ stamp.plays.keys() | list }}"
      when: "'monitoring_nodes' in group_names"

    - name: Assert stamp contains netdata_lxc (monitoring nodes only)
      ansible.builtin.assert:
        that: "'netdata_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing netdata_lxc entry: {{ stamp.plays.keys() | list }}"
      when: "'monitoring_nodes' in group_names"

    - name: Assert stamp contains openwrt_mesh_lxc (mesh wifi nodes only)
      ansible.builtin.assert:
        that: "'openwrt_mesh_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing openwrt_mesh_lxc entry: {{ stamp.plays.keys() | list }}"
      when:
        - "'wifi_nodes' in group_names"
        - "'router_nodes' not in group_names"

    - name: Report deploy_stamp contents
      ansible.builtin.debug:
        msg: >-
          deploy_stamp: version={{ stamp.project_version }},
          plays={{ stamp.plays.keys() | list | join(', ') }},
          last_run={{ stamp.last_run }}

# ── Play 2: Router node assertions (home-specific) ────────────────

- name: Verify router node state
  hosts: router_nodes
  gather_facts: false
  vars:
    openwrt_vm_id: 100
    proxmox_lan_mgmt_ip_offset: 2
  tasks:
    # ── Bridge topology ──────────────────────────────────────────

    - name: List physical-NIC-backed bridges
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for br in /sys/class/net/vmbr*/; do
            brname=$(basename "$br")
            for iface in $(ls "$br/brif/" 2>/dev/null); do
              if [ -e "/sys/class/net/$iface/device" ]; then
                echo "$brname"
                break
              fi
            done
          done
        executable: /bin/bash
      register: bridge_list
      changed_when: false

    - name: Assert at least two physical bridges exist
      ansible.builtin.assert:
        that: bridge_list.stdout_lines | length >= 2
        fail_msg: >-
          Expected at least 2 physical-NIC bridges, found
          {{ bridge_list.stdout_lines | length }}

    # ── WAN bridge detection ──────────────────────────────────────

    - name: Detect WAN bridge from default route
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ip -o route show default | awk '{print $5}' | head -1
        executable: /bin/bash
      register: wan_bridge_raw
      changed_when: false

    - name: Set WAN and LAN bridge facts
      ansible.builtin.set_fact:
        wan_bridge: "{{ wan_bridge_raw.stdout | trim }}"
        lan_bridges: >-
          {{ bridge_list.stdout_lines
             | difference([wan_bridge_raw.stdout | trim])
             | sort }}

    - name: Assert WAN bridge is a known physical bridge
      ansible.builtin.assert:
        that: wan_bridge in bridge_list.stdout_lines
        fail_msg: >-
          WAN bridge {{ wan_bridge }} not found in physical bridges
          {{ bridge_list.stdout_lines | join(', ') }}

    - name: Set primary LAN bridge
      ansible.builtin.set_fact:
        lan_bridge: "{{ lan_bridges | first }}"

    - name: Report detected topology
      ansible.builtin.debug:
        msg: >-
          WAN={{ wan_bridge }}, LAN={{ lan_bridges | join(', ') }},
          primary LAN={{ lan_bridge }}

    # ── VM state ──────────────────────────────────────────────────

    - name: Check OpenWrt VM is running
      ansible.builtin.command:
        cmd: qm status {{ openwrt_vm_id }}
      register: vm_running
      changed_when: false

    - name: Assert VM is in running state
      ansible.builtin.assert:
        that: "'running' in vm_running.stdout"
        fail_msg: "VM {{ openwrt_vm_id }} is not running: {{ vm_running.stdout }}"

    # ── VM auto-start and NIC ordering ──────────────────────────────

    - name: Read VM config (single call)
      ansible.builtin.command:
        cmd: qm config {{ openwrt_vm_id }}
      register: vm_cfg
      changed_when: false

    - name: Assert VM is configured to start on boot
      ansible.builtin.assert:
        that: "'onboot: 1' in vm_cfg.stdout"
        fail_msg: "VM {{ openwrt_vm_id }} missing onboot: 1"

    - name: Assert VM has startup order 1
      ansible.builtin.assert:
        that: vm_cfg.stdout is regex('startup:.*order=1')
        fail_msg: "VM {{ openwrt_vm_id }} missing startup order=1"

    - name: Extract net0 bridge from cached config
      ansible.builtin.set_fact:
        vm_net0_bridge_value: "{{ vm_cfg.stdout | regex_search('net0:.*bridge=([^,\\s]+)', '\\1') | first }}"

    - name: Assert net0 is the WAN bridge
      ansible.builtin.assert:
        that: vm_net0_bridge_value == wan_bridge
        fail_msg: >-
          VM net0 is on {{ vm_net0_bridge_value }},
          expected WAN bridge {{ wan_bridge }}

    # ── Proxmox LAN management IP ────────────────────────────────

    - name: Check Proxmox LAN management IP on LAN bridge
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ip -o -4 addr show dev {{ lan_bridge }} \
            | awk '{print $4}' | cut -d/ -f1
        executable: /bin/bash
      register: lan_bridge_ips
      changed_when: false

    - name: Assert Proxmox has at least one IP on LAN bridge
      ansible.builtin.assert:
        that: lan_bridge_ips.stdout_lines | length > 0
        fail_msg: >-
          No IPv4 address found on LAN bridge {{ lan_bridge }}.
          Proxmox LAN management IP was not configured.

    - name: Set Proxmox LAN IP fact
      ansible.builtin.set_fact:
        proxmox_lan_ip: "{{ lan_bridge_ips.stdout_lines | first }}"

    - name: Compute expected OpenWrt LAN IP from Proxmox LAN IP
      ansible.builtin.set_fact:
        openwrt_lan_ip: >-
          {{ proxmox_lan_ip.split('.')[0:3] | join('.') }}.1

    - name: Read ansible-bridges.conf for LAN bridge DHCP check
      ansible.builtin.slurp:
        src: /etc/network/interfaces.d/ansible-bridges.conf
      register: bridges_conf_raw

    - name: Assert LAN bridge uses DHCP in bridges config
      ansible.builtin.assert:
        that:
          - "'iface ' ~ lan_bridge ~ ' inet dhcp' in (bridges_conf_raw.content | b64decode)"
        fail_msg: >-
          LAN bridge {{ lan_bridge }} is not configured as 'inet dhcp' in
          ansible-bridges.conf. The Proxmox host will not auto-acquire a
          LAN management IP on boot.
          Content: {{ bridges_conf_raw.content | b64decode }}

    - name: Assert separate LAN management config is absent
      ansible.builtin.stat:
        path: /etc/network/interfaces.d/ansible-proxmox-lan.conf
      register: old_lan_conf

    - name: Verify old separate LAN config was removed
      ansible.builtin.assert:
        that: not old_lan_conf.stat.exists
        fail_msg: >-
          Stale ansible-proxmox-lan.conf still exists. It should be removed
          since the LAN bridge DHCP config is now in ansible-bridges.conf.

    - name: Verify Proxmox GUI port 8006 is accessible on LAN IP
      ansible.builtin.wait_for:
        host: "{{ proxmox_lan_ip }}"
        port: 8006
        timeout: 10

    - name: Check bridge has auto directive for boot persistence  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: >-
          grep -c 'auto {{ lan_bridge }}' /etc/network/interfaces.d/ansible-bridges.conf
      register: bridge_auto_check
      changed_when: false

    - name: Assert bridge comes up automatically on boot
      ansible.builtin.assert:
        that: (bridge_auto_check.stdout | trim | int) > 0
        fail_msg: >-
          Bridge {{ lan_bridge }} does not have 'auto' directive.
          It will not start automatically on boot.

    - name: Report Proxmox LAN management
      ansible.builtin.debug:
        msg: >-
          Proxmox LAN IP={{ proxmox_lan_ip }} on {{ lan_bridge }} (DHCP via bridges.conf),
          bridge_auto=yes, DHCP_config=yes,
          GUI port 8006=accessible,
          OpenWrt LAN IP={{ openwrt_lan_ip }}

    # ── OpenWrt connectivity and configuration ────────────────────

    - name: Set OpenWrt SSH command
      ansible.builtin.set_fact:
        openwrt_ssh: >-
          sshpass -p '' ssh
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
          -o PubkeyAuthentication=no -o ConnectTimeout=10
          root@{{ openwrt_lan_ip }}

    - name: Wait for OpenWrt SSH on LAN
      ansible.builtin.wait_for:
        host: "{{ openwrt_lan_ip }}"
        port: 22
        delay: 5
        timeout: 60

    - name: Check OpenWrt WAN interface and IP
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }}
          "wan_dev=\$(ip -o route show default | sed -n 's/.*dev \([^ ]*\).*/\1/p' | head -1);
          ip -o -4 addr show dev \$wan_dev 2>/dev/null | awk '{print \$2, \$4}'"
      register: wan_info
      changed_when: false

    - name: Assert WAN has an IP address
      ansible.builtin.assert:
        that: wan_info.stdout | trim | length > 0
        fail_msg: "WAN interface has no IPv4 address"

    - name: Check OpenWrt LAN IP  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci get network.lan.ipaddr"
      register: lan_ip
      changed_when: false

    - name: Check WAN IP prefix
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }}
          "wan_dev=\$(ip -o route show default | sed -n 's/.*dev \([^ ]*\).*/\1/p' | head -1);
          ip -o -4 addr show dev \$wan_dev
          | awk '{print \$4}' | cut -d/ -f1 | cut -d. -f1-3"
      register: wan_prefix
      changed_when: false

    - name: Compute LAN prefix
      ansible.builtin.set_fact:
        lan_prefix: "{{ (lan_ip.stdout | trim).split('.')[0:3] | join('.') }}"

    - name: Assert LAN subnet does not collide with WAN
      ansible.builtin.assert:
        that: lan_prefix != (wan_prefix.stdout | trim)
        fail_msg: >-
          LAN prefix {{ lan_prefix }} collides with WAN prefix
          {{ wan_prefix.stdout | trim }}

    # ── DHCP configuration ──────────────────────────────────────

    - name: Check OpenWrt DHCP start  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci get dhcp.lan.start"
      register: dhcp_start
      changed_when: false

    - name: Assert DHCP start is configured
      ansible.builtin.assert:
        that: (dhcp_start.stdout | trim | int) > 0
        fail_msg: "DHCP start not set or zero: {{ dhcp_start.stdout | trim }}"

    - name: Check OpenWrt DHCP limit  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci get dhcp.lan.limit"
      register: dhcp_limit
      changed_when: false

    - name: Assert DHCP limit is configured
      ansible.builtin.assert:
        that: (dhcp_limit.stdout | trim | int) > 0
        fail_msg: "DHCP limit not set or zero: {{ dhcp_limit.stdout | trim }}"

    - name: Check OpenWrt DHCP leasetime  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci get dhcp.lan.leasetime"
      register: dhcp_leasetime
      changed_when: false

    - name: Assert DHCP leasetime is configured
      ansible.builtin.assert:
        that: (dhcp_leasetime.stdout | trim | length) > 0
        fail_msg: "DHCP leasetime not set"

    - name: Get Proxmox LAN bridge MAC for reservation check  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: cat /sys/class/net/{{ lan_bridge }}/address
      register: lan_bridge_mac_raw
      delegate_to: "{{ inventory_hostname }}"
      changed_when: false

    - name: Check DHCP static lease for Proxmox host on OpenWrt
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci show dhcp | grep -i '{{ lan_bridge_mac_raw.stdout | trim }}' || echo 'no_reservation'"
      register: dhcp_reservation
      changed_when: false

    - name: Assert DHCP reservation exists for Proxmox host
      ansible.builtin.assert:
        that: "'no_reservation' not in dhcp_reservation.stdout"
        fail_msg: >-
          No DHCP static lease found on OpenWrt for Proxmox LAN bridge
          MAC {{ lan_bridge_mac_raw.stdout | trim }}. The Proxmox host
          will not get a predictable LAN IP on boot.
          Output: {{ dhcp_reservation.stdout }}

    - name: Check DHCP reservation IP matches expected
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci show dhcp | grep '.ip=' | grep '{{ proxmox_lan_ip }}' || echo 'ip_mismatch'"
      register: dhcp_reservation_ip
      changed_when: false

    - name: Assert DHCP reservation IP is correct
      ansible.builtin.assert:
        that: "'ip_mismatch' not in dhcp_reservation_ip.stdout"
        fail_msg: >-
          DHCP reservation IP does not match expected {{ proxmox_lan_ip }}.
          Output: {{ dhcp_reservation_ip.stdout }}

    - name: Report DHCP configuration
      ansible.builtin.debug:
        msg: >-
          DHCP: start={{ dhcp_start.stdout | trim }},
          limit={{ dhcp_limit.stdout | trim }},
          leasetime={{ dhcp_leasetime.stdout | trim }},
          proxmox_reservation={{ 'yes' if 'no_reservation' not in dhcp_reservation.stdout else 'no' }}

    # ── Proxmox GUI from LAN (leaf node perspective) ───────────────

    - name: Test Proxmox GUI reachable from OpenWrt VM (leaf node view)
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }}
          "(echo QUIT | nc {{ proxmox_lan_ip }} 8006) </dev/null >/dev/null 2>&1; echo exit=\$?"
      register: gui_from_lan
      changed_when: false

    - name: Assert Proxmox GUI is reachable from LAN
      ansible.builtin.assert:
        that: "'exit=0' in gui_from_lan.stdout"
        fail_msg: >-
          Cannot reach Proxmox GUI at {{ proxmox_lan_ip }}:8006 from
          OpenWrt VM. Leaf nodes cannot access the Proxmox web interface.
          Output: {{ gui_from_lan.stdout }}

    # ── WAN MAC address cloning ────────────────────────────────────

    - name: Get UCI WAN MAC setting from OpenWrt
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "uci get network.wan.macaddr 2>/dev/null || echo ''"
      register: vm_wan_mac
      changed_when: false

    - name: Check for deferred WAN MAC file
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "cat /etc/openwrt_wan_mac_deferred 2>/dev/null || echo ''"
      register: vm_deferred_mac
      changed_when: false

    - name: Set WAN MAC test facts
      ansible.builtin.set_fact:
        _wan_mac_env: "{{ lookup('env', 'WAN_MAC') | default('') }}"
        _wan_mac_uci: "{{ vm_wan_mac.stdout | trim }}"
        _wan_mac_deferred: "{{ vm_deferred_mac.stdout | trim }}"

    - name: Assert MAC applied OR deferred when WAN_MAC is set
      ansible.builtin.assert:
        that: >-
          (_wan_mac_uci | upper) == (_wan_mac_env | upper)
          or (_wan_mac_deferred | upper) == (_wan_mac_env | upper)
        fail_msg: >-
          WAN_MAC={{ _wan_mac_env }} but neither UCI ({{ _wan_mac_uci }})
          nor deferred file ({{ _wan_mac_deferred }}) contains it
      when: _wan_mac_env | length > 0

    - name: Assert MAC not in both UCI and deferred file
      ansible.builtin.assert:
        that: not (_wan_mac_uci | length > 0 and _wan_mac_deferred | length > 0)
        fail_msg: >-
          WAN MAC in both UCI ({{ _wan_mac_uci }}) and deferred file
          ({{ _wan_mac_deferred }}) — should be one or the other
      when: _wan_mac_env | length > 0

    - name: Assert no WAN MAC artifacts when not configured
      ansible.builtin.assert:
        that:
          - _wan_mac_uci == ""
          - _wan_mac_deferred == ""
        fail_msg: >-
          WAN_MAC not set but found UCI={{ _wan_mac_uci }},
          deferred={{ _wan_mac_deferred }}
      when: _wan_mac_env | length == 0

    - name: Check WAN MAC auto-apply init script exists when deferred
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "test -x /etc/init.d/wan_mac_apply && echo 'present' || echo 'missing'"
      register: mac_init_script
      changed_when: false
      when: _wan_mac_deferred | length > 0

    - name: Assert auto-apply init script is deployed when MAC deferred
      ansible.builtin.assert:
        that: (mac_init_script.stdout | trim) == "present"
        fail_msg: >-
          Deferred MAC file exists but /etc/init.d/wan_mac_apply is
          {{ mac_init_script.stdout | trim }}. The MAC would never be
          auto-applied on reboot.
      when: _wan_mac_deferred | length > 0

    - name: Check init script is enabled (symlinked in rc.d)
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "ls /etc/rc.d/S99wan_mac_apply 2>/dev/null && echo 'enabled' || echo 'disabled'"
      register: mac_init_enabled
      changed_when: false
      when: _wan_mac_deferred | length > 0

    - name: Assert init script is enabled when MAC deferred
      ansible.builtin.assert:
        that: "'enabled' in (mac_init_enabled.stdout | trim)"
        fail_msg: >-
          wan_mac_apply init script is not enabled — won't run on boot.
          Status: {{ mac_init_enabled.stdout | trim }}
      when: _wan_mac_deferred | length > 0

    - name: Check dmesg for IPv6 duplicate address errors
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }} "dmesg | grep -c 'IPv6 duplicate address' 2>/dev/null || echo 0"
      register: ipv6_dup_count
      changed_when: false

    - name: Assert no IPv6 duplicate address errors
      ansible.builtin.assert:
        that: (ipv6_dup_count.stdout | trim | int) == 0
        fail_msg: >-
          Found {{ ipv6_dup_count.stdout | trim }} IPv6 duplicate address
          errors in dmesg — indicates MAC conflict on L2 segment

    - name: Report WAN MAC status
      ansible.builtin.debug:
        msg: >-
          WAN MAC: {{ 'applied via UCI: ' + _wan_mac_uci
          if _wan_mac_uci | length > 0
          else ('deferred to /etc/openwrt_wan_mac_deferred: ' + _wan_mac_deferred
          if _wan_mac_deferred | length > 0
          else 'not configured (using auto-generated MAC)') }}

    # ── WiFi ────────────────────────────────────────────────────

    - name: Check for WiFi radios in VM
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }}
          "ls -1 /sys/class/ieee80211/ 2>/dev/null | wc -l"
      register: radio_count
      changed_when: false

    - name: Verify mesh configuration (when WiFi is present)
      ansible.builtin.shell:
        cmd: >-
          {{ openwrt_ssh }}
          "uci show wireless 2>/dev/null | grep \"mode='mesh'\" | wc -l"
      register: mesh_iface_count
      changed_when: false
      when: (radio_count.stdout | trim | int) > 0

    - name: Assert mesh interfaces match radio count
      ansible.builtin.assert:
        that: >-
          (mesh_iface_count.stdout | trim | int) >=
          (radio_count.stdout | trim | int)
        fail_msg: >-
          Expected {{ radio_count.stdout | trim }} mesh interfaces,
          found {{ mesh_iface_count.stdout | trim }}
      when: (radio_count.stdout | trim | int) > 0

    # ── Host address state file ───────────────────────────────────

    - name: Check state file exists on controller
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../.state/addresses.json"
      register: state_file
      delegate_to: localhost

    - name: Assert state file was written
      ansible.builtin.assert:
        that: state_file.stat.exists
        fail_msg: ".state/addresses.json not found on controller"

    - name: Read state file
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../../.state/addresses.json"
      register: state_raw
      delegate_to: localhost

    - name: Parse state file
      ansible.builtin.set_fact:
        state_data: "{{ state_raw.content | b64decode | from_json }}"

    - name: Assert state file contains host and IPs
      ansible.builtin.assert:
        that:
          - state_data.host is defined
          - state_data.ips is defined
          - state_data.ips | length >= 2
          - proxmox_lan_ip in state_data.ips
        fail_msg: >-
          State file malformed or missing LAN IP.
          Contents: {{ state_data }}

    - name: Report state file contents
      ansible.builtin.debug:
        msg: >-
          State file: host={{ state_data.host }},
          IPs={{ state_data.ips | join(', ') }}

    # ── Generated env file: LAN subnet output ──────────────────────

    - name: Check test.env.generated contains LAN subnet
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep -c '^LAN_GATEWAY=' "{{ playbook_dir }}/../../test.env.generated"
        executable: /bin/bash
      register: _lan_gw_check
      delegate_to: localhost
      changed_when: false

    - name: Assert LAN_GATEWAY was written to generated env
      ansible.builtin.assert:
        that: (_lan_gw_check.stdout | trim | int) > 0
        fail_msg: "test.env.generated missing LAN_GATEWAY entry"

    - name: Read LAN_GATEWAY value from generated env  # noqa command-instead-of-shell
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          grep '^LAN_GATEWAY=' "{{ playbook_dir }}/../../test.env.generated" | cut -d= -f2
        executable: /bin/bash
      register: _generated_lan_gw
      delegate_to: localhost
      changed_when: false

    - name: Assert generated LAN_GATEWAY matches OpenWrt LAN IP
      ansible.builtin.assert:
        that: (_generated_lan_gw.stdout | trim) == (lan_ip.stdout | trim)
        fail_msg: >-
          Generated LAN_GATEWAY={{ _generated_lan_gw.stdout | trim }}
          does not match OpenWrt LAN IP={{ lan_ip.stdout | trim }}

    # ── Final report ──────────────────────────────────────────────

    - name: Report router verification results
      ansible.builtin.debug:
        msg: >-
          Router verification passed:
          WAN bridge={{ wan_bridge }}, LAN bridge={{ lan_bridge }},
          VM net0={{ vm_net0_bridge_value }},
          Proxmox LAN IP={{ proxmox_lan_ip }},
          WAN={{ wan_info.stdout | trim }},
          LAN={{ lan_ip.stdout | trim }},
          WiFi radios={{ radio_count.stdout | trim }},
          Mesh={{ mesh_iface_count.stdout | default('0') | trim }},
          LAN_GATEWAY(generated)={{ _generated_lan_gw.stdout | trim }}

# ── Play 3: Pi-hole assertions (dns_nodes) ───────────────────────

- name: Verify Pi-hole LXC on DNS nodes
  hosts: dns_nodes
  gather_facts: false
  tasks:
    # ── Pi-hole container ──────────────────────────────────────────

    - name: Check Pi-hole container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ pihole_ct_id }} | grep -c running
        executable: /bin/bash
      register: pihole_ct_running
      changed_when: false

    - name: Assert Pi-hole container is running
      ansible.builtin.assert:
        that: (pihole_ct_running.stdout | trim | int) > 0
        fail_msg: "Container {{ pihole_ct_id }} is not running on {{ inventory_hostname }}"

    - name: Read Pi-hole container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ pihole_ct_id }}
      register: pihole_ct_cfg
      changed_when: false

    - name: Assert Pi-hole container starts on boot
      ansible.builtin.assert:
        that: "'onboot: 1' in pihole_ct_cfg.stdout"
        fail_msg: "Container {{ pihole_ct_id }} on {{ inventory_hostname }} missing onboot: 1"

    - name: Assert Pi-hole container has startup order 3
      ansible.builtin.assert:
        that: pihole_ct_cfg.stdout is regex('startup:.*order=3')
        fail_msg: "Container {{ pihole_ct_id }} on {{ inventory_hostname }} missing startup order=3"

    - name: Assert Pi-hole container has nesting enabled
      ansible.builtin.assert:
        that: "'nesting=1' in pihole_ct_cfg.stdout"
        fail_msg: "Container {{ pihole_ct_id }} on {{ inventory_hostname }} missing nesting=1"

    # ── Pi-hole health checks (batched single pct exec) ───────────

    - name: Run Pi-hole container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ pihole_ct_id }} -- /bin/sh -c '
          echo "FTL=$(/usr/local/bin/pihole status 2>/dev/null | head -3)";
          echo "WEB=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/admin/ 2>/dev/null)";
          echo "DHCP=$(/usr/bin/pihole-FTL --config dhcp.active 2>/dev/null)"
          '
      register: pihole_health
      changed_when: false

    - name: Assert FTL is active
      ansible.builtin.assert:
        that: "'FTL' in pihole_health.stdout or 'Enabled' in pihole_health.stdout or 'Active' in pihole_health.stdout"
        fail_msg: "Pi-hole FTL not active on {{ inventory_hostname }}"

    - name: Parse web admin status
      ansible.builtin.set_fact:
        _pihole_web_code: "{{ pihole_health.stdout | regex_search('WEB=(\\d+)', '\\1') | first }}"

    - name: Assert web admin is accessible
      ansible.builtin.assert:
        that: _pihole_web_code in ['200', '301']
        fail_msg: "Web admin HTTP status: {{ _pihole_web_code }}"

    # ── DNS resolution (kept separate for retry logic) ───────────

    - name: Wait for FTL to listen on port 53
      ansible.builtin.command:
        cmd: pct exec {{ pihole_ct_id }} -- /bin/sh -c 'ss -tlnp | grep -q :53'
      register: _ftl_listen
      changed_when: false
      retries: 6
      delay: 5
      until: _ftl_listen.rc == 0

    - name: Test DNS query through Pi-hole
      ansible.builtin.command:
        cmd: pct exec {{ pihole_ct_id }} -- dig @127.0.0.1 google.com +short +time=5
      register: pihole_dns_test
      changed_when: false
      retries: 5
      delay: 10
      until: pihole_dns_test.rc == 0 and (pihole_dns_test.stdout | trim | length > 0)

    - name: Assert DNS resolves through Pi-hole
      ansible.builtin.assert:
        that: pihole_dns_test.stdout | trim | length > 0
        fail_msg: "DNS resolution failed through Pi-hole"

    - name: Assert DHCP is disabled
      ansible.builtin.assert:
        that: "'false' in pihole_health.stdout"
        fail_msg: "DHCP is active in Pi-hole — should be disabled"

    # ── deploy_stamp ─────────────────────────────────────────────

    - name: Assert stamp contains pihole_lxc (dns nodes only)
      ansible.builtin.assert:
        that: "'pihole_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing pihole_lxc entry: {{ stamp.plays.keys() | list }}"

    - name: Report Pi-hole verification
      ansible.builtin.debug:
        msg: >-
          Pi-hole verification passed on {{ inventory_hostname }}:
          container={{ pihole_ct_id }}, running=yes,
          web={{ _pihole_web_code }},
          dns={{ 'working' if pihole_dns_test.stdout | trim | length > 0 else 'failed' }}

# ── Play 4: rsyslog assertions (monitoring_nodes) ────────────────

- name: Verify rsyslog LXC on monitoring nodes
  hosts: monitoring_nodes
  gather_facts: false
  tasks:
    # ── rsyslog container ──────────────────────────────────────────

    - name: Check rsyslog container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ rsyslog_ct_id }} | grep -c running
        executable: /bin/bash
      register: rsyslog_ct_running
      changed_when: false

    - name: Assert rsyslog container is running
      ansible.builtin.assert:
        that: (rsyslog_ct_running.stdout | trim | int) > 0
        fail_msg: "Container {{ rsyslog_ct_id }} is not running on {{ inventory_hostname }}"

    - name: Read rsyslog container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ rsyslog_ct_id }}
      register: rsyslog_ct_cfg
      changed_when: false

    - name: Assert rsyslog container starts on boot
      ansible.builtin.assert:
        that: "'onboot: 1' in rsyslog_ct_cfg.stdout"
        fail_msg: "Container {{ rsyslog_ct_id }} on {{ inventory_hostname }} missing onboot: 1"

    - name: Assert rsyslog container has startup order 3
      ansible.builtin.assert:
        that: rsyslog_ct_cfg.stdout is regex('startup:.*order=3')
        fail_msg: "Container {{ rsyslog_ct_id }} on {{ inventory_hostname }} missing startup order=3"

    # ── Baked config files ─────────────────────────────────────────

    - name: Check baked rsyslog config files exist
      ansible.builtin.command:
        cmd: >-
          pct exec {{ rsyslog_ct_id }} -- /bin/sh -c
          'test -f /etc/rsyslog.d/10-receive.conf && test -f /etc/rsyslog.d/50-remote-route.conf'
      register: rsyslog_baked_confs
      changed_when: false

    - name: Assert baked rsyslog configs are present
      ansible.builtin.assert:
        that: rsyslog_baked_confs.rc == 0
        fail_msg: "Baked rsyslog config files missing (10-receive.conf or 50-remote-route.conf)"

    # ── rsyslog health checks (batched single pct exec) ────────────

    - name: Run rsyslog container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ rsyslog_ct_id }} -- /bin/sh -c '
          echo "SVC=$(systemctl is-active rsyslog 2>/dev/null || echo inactive)";
          /usr/sbin/rsyslogd -N1 >/dev/null 2>&1; echo "CFG_VALID=$?";
          echo "TCP514=$(ss -tlnp 2>/dev/null | grep -c ":514")";
          echo "SPOOL=$(test -d /var/spool/rsyslog && echo present || echo missing)";
          echo "LOGROTATE=$(test -f /etc/logrotate.d/rsyslog-remote && echo present || echo missing)";
          MEM=$(free -m | awk "/^Mem:/{print \$3}"); echo "MEM=${MEM}"
          '
      register: rsyslog_health
      changed_when: false

    - name: Assert rsyslog service is active
      ansible.builtin.assert:
        that: "'SVC=active' in rsyslog_health.stdout"
        fail_msg: "rsyslog service not active on {{ inventory_hostname }}"

    - name: Assert rsyslog config is valid
      ansible.builtin.assert:
        that: "'CFG_VALID=0' in rsyslog_health.stdout"
        fail_msg: "rsyslog config validation failed on {{ inventory_hostname }}"

    - name: Assert TCP 514 is listening
      ansible.builtin.assert:
        that: rsyslog_health.stdout | regex_search('TCP514=(\d+)', '\\1') | first | int > 0
        fail_msg: "rsyslog not listening on TCP 514 on {{ inventory_hostname }}"

    - name: Assert spool directory exists
      ansible.builtin.assert:
        that: "'SPOOL=present' in rsyslog_health.stdout"
        fail_msg: "/var/spool/rsyslog missing on {{ inventory_hostname }}"

    # ── Log reception test ───────────────────────────────────────

    - name: Extract rsyslog container IP from cached config
      ansible.builtin.set_fact:
        _rsyslog_verify_ip: "{{ rsyslog_ct_cfg.stdout | regex_search('ip=([^/,]+)', '\\1') | first }}"

    - name: Assert container IP is not empty
      ansible.builtin.assert:
        that: (_rsyslog_verify_ip | length) > 0
        fail_msg: "Could not determine rsyslog container IP from pct config on {{ inventory_hostname }}"

    - name: Assert container IP does not collide with host IP
      ansible.builtin.assert:
        that: _rsyslog_verify_ip != ansible_host
        fail_msg: >-
          Container IP {{ _rsyslog_verify_ip }} collides with host IP
          {{ ansible_host }} on {{ inventory_hostname }}

    - name: Send test log message to rsyslog container
      ansible.builtin.shell:
        cmd: >-
          logger --tcp -n {{ _rsyslog_verify_ip }} -P 514
          "molecule-default-verify-rsyslog-$(date +%s)"
      changed_when: true
      retries: 3
      delay: 5
      register: _rsyslog_send
      until: _rsyslog_send.rc == 0

    - name: Wait for log to arrive
      ansible.builtin.pause:
        seconds: 3

    - name: Check test log arrived in container
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name '*.log' -exec grep -l 'molecule-default-verify-rsyslog' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: rsyslog_log_test
      changed_when: false
      failed_when: false

    - name: Assert test log was received
      ansible.builtin.assert:
        that: rsyslog_log_test.stdout | trim | length > 0
        fail_msg: "Test log message not found in /var/log/remote/ inside container"

    # ── Multi-source separation test ──────────────────────────────

    - name: Send tagged log messages for separation test
      ansible.builtin.shell:
        cmd: |
          logger --tcp -n {{ _rsyslog_verify_ip }} -P 514 -t e2e_daemon_a "e2e-separation-a-$(date +%s)" &&
          logger --tcp -n {{ _rsyslog_verify_ip }} -P 514 -t e2e_daemon_b "e2e-separation-b-$(date +%s)"
      changed_when: true

    - name: Wait for tagged logs to arrive
      ansible.builtin.pause:
        seconds: 3

    - name: Check daemon_a log is in its own file
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'e2e_daemon_a.log' -exec grep -c 'e2e-separation-a' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: rsyslog_daemon_a
      changed_when: false
      failed_when: false

    - name: Check daemon_b log is in its own file
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'e2e_daemon_b.log' -exec grep -c 'e2e-separation-b' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: rsyslog_daemon_b
      changed_when: false
      failed_when: false

    - name: Assert per-program log separation works
      ansible.builtin.assert:
        that:
          - (rsyslog_daemon_a.stdout | trim | int) > 0
          - (rsyslog_daemon_b.stdout | trim | int) > 0
        fail_msg: >-
          Per-program separation failed:
          daemon_a={{ rsyslog_daemon_a.stdout | trim }},
          daemon_b={{ rsyslog_daemon_b.stdout | trim }}

    # ── No-leak test: remote messages must NOT appear in local syslog

    - name: Send uniquely tagged message for leak test
      ansible.builtin.shell:
        cmd: >-
          logger --tcp -n {{ _rsyslog_verify_ip }} -P 514 -t e2e_leak
          "noleak-e2e-sentinel-$(date +%s)"
      changed_when: true

    - name: Wait for message processing
      ansible.builtin.pause:
        seconds: 3

    - name: Check message landed in remote log (expected)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'e2e_leak.log' -exec grep -c 'noleak-e2e-sentinel' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: rsyslog_leak_remote
      changed_when: false
      failed_when: false

    - name: Check message did NOT leak to local syslog
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ rsyslog_ct_id }} -- grep -c 'noleak-e2e-sentinel'
          /var/log/syslog 2>/dev/null || echo 0
      register: rsyslog_leak_local
      changed_when: false
      failed_when: false

    - name: Assert remote messages are isolated from local syslog
      ansible.builtin.assert:
        that:
          - (rsyslog_leak_remote.stdout | trim | int) > 0
          - (rsyslog_leak_local.stdout | trim | int) == 0
        fail_msg: >-
          Remote message isolation failed:
          in_remote={{ rsyslog_leak_remote.stdout | trim }},
          in_local_syslog={{ rsyslog_leak_local.stdout | trim }}

    # ── Memory and logrotate checks (from batched health output) ──

    - name: Parse rsyslog memory usage from health check
      ansible.builtin.set_fact:
        _rsyslog_mem_mb: "{{ rsyslog_health.stdout | regex_search('MEM=(\\d+)', '\\1') | first }}"

    - name: Assert memory usage is reasonable for 64 MB container
      ansible.builtin.assert:
        that: (_rsyslog_mem_mb | int) < 56
        fail_msg: >-
          rsyslog container on {{ inventory_hostname }} using
          {{ _rsyslog_mem_mb }} MB of 64 MB — risk of OOM

    - name: Assert logrotate config exists
      ansible.builtin.assert:
        that: "'LOGROTATE=present' in rsyslog_health.stdout"
        fail_msg: "/etc/logrotate.d/rsyslog-remote missing on {{ inventory_hostname }}"

    - name: Validate logrotate config syntax
      ansible.builtin.command:
        cmd: pct exec {{ rsyslog_ct_id }} -- logrotate --debug /etc/logrotate.d/rsyslog-remote
      register: rsyslog_logrotate_valid
      changed_when: false
      failed_when: false

    - name: Assert logrotate config is valid
      ansible.builtin.assert:
        that: rsyslog_logrotate_valid.rc == 0
        fail_msg: "logrotate config invalid on {{ inventory_hostname }}: {{ rsyslog_logrotate_valid.stderr }}"

    # ── deploy_stamp ─────────────────────────────────────────────

    - name: Assert stamp contains rsyslog_lxc
      ansible.builtin.assert:
        that: "'rsyslog_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing rsyslog_lxc entry: {{ stamp.plays.keys() | list }}"

    - name: Report rsyslog verification
      ansible.builtin.debug:
        msg: >-
          rsyslog verification passed on {{ inventory_hostname }}:
          container={{ rsyslog_ct_id }}, running=yes,
          ip={{ _rsyslog_verify_ip }},
          config_valid=yes,
          tcp_514=listening,
          log_reception={{ 'verified' if rsyslog_log_test.stdout | trim | length > 0 else 'failed' }},
          multi_source=verified,
          remote_isolation=verified,
          memory={{ _rsyslog_mem_mb }}MB,
          logrotate=valid

    # ── Netdata container ──────────────────────────────────────────

    - name: Check Netdata container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ netdata_ct_id }} | grep -c running
        executable: /bin/bash
      register: netdata_ct_running
      changed_when: false

    - name: Assert Netdata container is running
      ansible.builtin.assert:
        that: (netdata_ct_running.stdout | trim | int) > 0
        fail_msg: "Container {{ netdata_ct_id }} is not running on {{ inventory_hostname }}"

    - name: Read Netdata container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ netdata_ct_id }}
      register: netdata_ct_cfg
      changed_when: false

    - name: Assert Netdata container starts on boot
      ansible.builtin.assert:
        that: "'onboot: 1' in netdata_ct_cfg.stdout"
        fail_msg: "Container {{ netdata_ct_id }} on {{ inventory_hostname }} missing onboot: 1"

    - name: Assert Netdata container has startup order 3
      ansible.builtin.assert:
        that: netdata_ct_cfg.stdout is regex('startup:.*order=3')
        fail_msg: "Container {{ netdata_ct_id }} on {{ inventory_hostname }} missing startup order=3"

    # ── Bind mounts ──────────────────────────────────────────────

    - name: Assert /host/proc bind mount exists
      ansible.builtin.assert:
        that: "'/host/proc' in netdata_ct_cfg.stdout"
        fail_msg: "Bind mount for /host/proc not found in container config on {{ inventory_hostname }}"

    - name: Assert /host/sys bind mount exists
      ansible.builtin.assert:
        that: "'/host/sys' in netdata_ct_cfg.stdout"
        fail_msg: "Bind mount for /host/sys not found in container config on {{ inventory_hostname }}"

    # ── Nesting feature ──────────────────────────────────────────

    - name: Assert nesting=1 is enabled
      ansible.builtin.assert:
        that: "'nesting=1' in netdata_ct_cfg.stdout"
        fail_msg: "Container missing nesting=1 on {{ inventory_hostname }}"

    # ── Netdata container health checks (batched single pct exec) ─

    - name: Run Netdata container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ netdata_ct_id }} -- /bin/sh -c '
          echo "OVERRIDE=$(test -f /etc/systemd/system/netdata.service.d/lxc-override.conf && echo present || echo missing)";
          echo "SVC=$(systemctl is-active netdata 2>/dev/null || echo inactive)";
          echo "CPUINFO=$(test -f /host/proc/cpuinfo && echo present || echo missing)";
          MEM=$(free -m | awk "/^Mem:/{print \$3}"); echo "MEM=${MEM}"
          '
      register: netdata_health
      changed_when: false

    - name: Assert systemd override is present
      ansible.builtin.assert:
        that: "'OVERRIDE=present' in netdata_health.stdout"
        fail_msg: "systemd LXC override not found on {{ inventory_hostname }}"

    - name: Assert Netdata service is active
      ansible.builtin.assert:
        that: "'SVC=active' in netdata_health.stdout"
        fail_msg: "Netdata service not active on {{ inventory_hostname }}"

    # ── Dashboard on port 19999 (kept separate for retry logic) ──

    - name: Check Netdata dashboard responds
      ansible.builtin.command:
        cmd: pct exec {{ netdata_ct_id }} -- curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:19999
      register: netdata_dashboard
      changed_when: false
      retries: 3
      delay: 3
      until: (netdata_dashboard.stdout | trim) == '200'

    - name: Assert dashboard is accessible
      ansible.builtin.assert:
        that: (netdata_dashboard.stdout | trim) == '200'
        fail_msg: "Dashboard HTTP status on {{ inventory_hostname }}: {{ netdata_dashboard.stdout | trim }}"

    - name: Assert host cpuinfo is readable
      ansible.builtin.assert:
        that: "'CPUINFO=present' in netdata_health.stdout"
        fail_msg: "/host/proc/cpuinfo not accessible in container on {{ inventory_hostname }}"

    # ── Container IP validation ──────────────────────────────────

    - name: Extract netdata container IP from cached config
      ansible.builtin.set_fact:
        _netdata_verify_ip: "{{ netdata_ct_cfg.stdout | regex_search('ip=([^/,]+)', '\\1') | first }}"

    - name: Assert container IP is not empty
      ansible.builtin.assert:
        that: (_netdata_verify_ip | length) > 0
        fail_msg: "Could not determine netdata container IP from pct config on {{ inventory_hostname }}"

    - name: Assert container IP does not collide with host IP
      ansible.builtin.assert:
        that: _netdata_verify_ip != ansible_host
        fail_msg: >-
          Container IP {{ _netdata_verify_ip }} collides with host IP
          {{ ansible_host }} on {{ inventory_hostname }}

    # ── Memory usage check (from batched health output) ──────────

    - name: Parse Netdata memory usage from health check
      ansible.builtin.set_fact:
        _netdata_mem_mb: "{{ netdata_health.stdout | regex_search('MEM=(\\d+)', '\\1') | first }}"

    - name: Assert memory usage is reasonable for 128 MB container
      ansible.builtin.assert:
        that: (_netdata_mem_mb | int) < 112
        fail_msg: >-
          Netdata container on {{ inventory_hostname }} using
          {{ _netdata_mem_mb }} MB of 128 MB — risk of OOM

    # ── deploy_stamp ─────────────────────────────────────────────

    - name: Assert stamp contains netdata_lxc
      ansible.builtin.assert:
        that: "'netdata_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing netdata_lxc entry: {{ stamp.plays.keys() | list }}"

    - name: Report Netdata verification
      ansible.builtin.debug:
        msg: >-
          Netdata verification passed on {{ inventory_hostname }}:
          container={{ netdata_ct_id }}, running=yes,
          ip={{ _netdata_verify_ip }},
          dashboard={{ netdata_dashboard.stdout | trim }},
          host_proc=accessible,
          bind_mounts=present,
          memory={{ _netdata_mem_mb }}MB

# ── Play 6: WireGuard assertions (all vpn_nodes) ─────────────────

- name: Verify WireGuard LXC on VPN nodes
  hosts: vpn_nodes
  gather_facts: false
  tasks:
    # ── WireGuard container ────────────────────────────────────────

    - name: Check WireGuard container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ wireguard_ct_id }} | grep -c running
        executable: /bin/bash
      register: wg_ct_running
      changed_when: false

    - name: Assert WireGuard container is running
      ansible.builtin.assert:
        that: (wg_ct_running.stdout | trim | int) > 0
        fail_msg: "Container {{ wireguard_ct_id }} is not running on {{ inventory_hostname }}"

    - name: Read WireGuard container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ wireguard_ct_id }}
      register: wg_ct_cfg
      changed_when: false

    - name: Assert WireGuard container starts on boot
      ansible.builtin.assert:
        that: "'onboot: 1' in wg_ct_cfg.stdout"
        fail_msg: "Container {{ wireguard_ct_id }} on {{ inventory_hostname }} missing onboot: 1"

    - name: Assert WireGuard container has startup order 2
      ansible.builtin.assert:
        that: wg_ct_cfg.stdout is regex('startup:.*order=2')
        fail_msg: "Container {{ wireguard_ct_id }} on {{ inventory_hostname }} missing startup order=2"

    - name: Assert WireGuard container has nesting enabled
      ansible.builtin.assert:
        that: "'nesting=1' in wg_ct_cfg.stdout"
        fail_msg: "Container {{ wireguard_ct_id }} on {{ inventory_hostname }} missing nesting=1"

    # ── Kernel module on host ──────────────────────────────────────

    - name: Check wireguard kernel module on host
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lsmod | grep -c '^wireguard'
        executable: /bin/bash
      register: wg_module_loaded
      changed_when: false

    - name: Assert wireguard kernel module is loaded
      ansible.builtin.assert:
        that: (wg_module_loaded.stdout | trim | int) > 0
        fail_msg: "wireguard kernel module is not loaded on {{ inventory_hostname }}"

    - name: Check wireguard module persistence file
      ansible.builtin.stat:
        path: /etc/modules-load.d/wireguard.conf
      register: wg_module_conf

    - name: Assert wireguard module persistence exists
      ansible.builtin.assert:
        that: wg_module_conf.stat.exists
        fail_msg: "/etc/modules-load.d/wireguard.conf missing on {{ inventory_hostname }}"

    # ── WireGuard configuration (batched single pct exec) ──────────

    - name: Run WireGuard container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ wireguard_ct_id }} -- /bin/sh -c '
          echo "IFACE=$(ip link show wg0 >/dev/null 2>&1 && echo ok || echo missing)";
          echo "PERMS=$(stat -c "%a" /etc/wireguard/wg0.conf 2>/dev/null || echo missing)";
          echo "PEER=$(wg show wg0 2>/dev/null | grep -c -E "peer|endpoint")";
          echo "SVC=$(systemctl is-enabled wg-quick@wg0 2>/dev/null || echo unknown)";
          echo "IPFWD=$(sysctl -n net.ipv4.ip_forward 2>/dev/null || echo 0)";
          echo "SYSCTL=$(test -f /etc/sysctl.d/99-wireguard.conf && echo present || echo missing)";
          echo "NAT=$(iptables -t nat -C POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null && echo present || echo missing)"
          '
      register: wg_health
      changed_when: false

    - name: Assert wg0 interface exists
      ansible.builtin.assert:
        that: "'IFACE=ok' in wg_health.stdout"
        fail_msg: "wg0 interface not found in container {{ wireguard_ct_id }} on {{ inventory_hostname }}"

    - name: Assert wg0 config has correct permissions
      ansible.builtin.assert:
        that: "'PERMS=600' in wg_health.stdout"
        fail_msg: >-
          /etc/wireguard/wg0.conf permissions incorrect on {{ inventory_hostname }}.
          Health output: {{ wg_health.stdout }}

    - name: Assert wg show reports peer
      ansible.builtin.assert:
        that: wg_health.stdout | regex_search('PEER=(\d+)', '\\1') | first | int > 0
        fail_msg: "wg show wg0 missing peer/endpoint info on {{ inventory_hostname }}"

    - name: Assert wg-quick@wg0 is enabled
      ansible.builtin.assert:
        that: "'SVC=enabled' in wg_health.stdout"
        fail_msg: "wg-quick@wg0 not enabled on {{ inventory_hostname }}"

    - name: Assert IP forwarding is enabled
      ansible.builtin.assert:
        that: "'IPFWD=1' in wg_health.stdout"
        fail_msg: "IP forwarding not enabled on {{ inventory_hostname }}"

    - name: Assert IP forwarding sysctl file exists
      ansible.builtin.assert:
        that: "'SYSCTL=present' in wg_health.stdout"
        fail_msg: "/etc/sysctl.d/99-wireguard.conf missing on {{ inventory_hostname }}"

    - name: Assert MASQUERADE rule present on wg0
      ansible.builtin.assert:
        that: "'NAT=present' in wg_health.stdout"
        fail_msg: "MASQUERADE rule missing on {{ inventory_hostname }}"

    # ── Generated env file (controller, check once) ────────────────

    - name: Check test.env.generated exists on controller
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../test.env.generated"
      register: env_generated
      delegate_to: localhost
      run_once: true

    - name: Assert test.env.generated was written (auto-generated keys)
      ansible.builtin.assert:
        that: env_generated.stat.exists
        fail_msg: "test.env.generated not found on controller"
      when: lookup('env', 'WIREGUARD_PRIVATE_KEY') | length == 0
      run_once: true

    - name: Read test.env.generated for public key check
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../../test.env.generated"
      register: env_generated_content
      delegate_to: localhost
      when:
        - lookup('env', 'WIREGUARD_PRIVATE_KEY') | length == 0
        - env_generated.stat.exists
      run_once: true

    - name: Assert test.env.generated contains client public key
      ansible.builtin.assert:
        that: "'WIREGUARD_PUBLIC_KEY=' in (env_generated_content.content | b64decode)"
        fail_msg: "test.env.generated missing WIREGUARD_PUBLIC_KEY entry"
      when:
        - lookup('env', 'WIREGUARD_PRIVATE_KEY') | length == 0
        - env_generated.stat.exists
      run_once: true

    - name: Report WireGuard verification
      ansible.builtin.debug:
        msg: >-
          WireGuard verification passed on {{ inventory_hostname }}:
          container={{ wireguard_ct_id }}, running=yes,
          wg0={{ 'present' if 'IFACE=ok' in wg_health.stdout else 'absent' }},
          ip_forward={{ 'enabled' if 'IPFWD=1' in wg_health.stdout else 'disabled' }},
          nat={{ 'present' if 'NAT=present' in wg_health.stdout else 'absent' }}

# ── Play 4: LAN host assertions (mesh1-specific) ─────────────────

- name: Verify LAN satellite hosts
  hosts: lan_hosts
  gather_facts: false
  tasks:
    - name: Check Proxmox API is responsive
      ansible.builtin.command:
        cmd: pvesh get /version --output-format json
      register: pve_version
      changed_when: false

    - name: Assert PVE API returned valid response
      ansible.builtin.assert:
        that: (pve_version.stdout | from_json).version is defined
        fail_msg: "Proxmox API not responsive on {{ inventory_hostname }}: {{ pve_version.stdout }}"

    - name: Check IOMMU status on LAN host
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          dmesg | grep -i -c 'IOMMU enabled\|DMAR.*IOMMU\|Adding to iommu group'
        executable: /bin/bash
      register: lan_iommu
      changed_when: false
      failed_when: false

    - name: Report LAN host IOMMU
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} IOMMU: {{ 'active' if (lan_iommu.stdout | int) > 0 else 'not active' }}

    - name: Check WiFi PCI devices
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lspci -nn | grep -ic 'Network controller.*Intel'
        executable: /bin/bash
      register: lan_wifi_count
      changed_when: false
      failed_when: false

    - name: Report LAN host WiFi
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} WiFi devices: {{ lan_wifi_count.stdout | trim }}

    - name: Report LAN host verification
      ansible.builtin.debug:
        msg: >-
          LAN host {{ inventory_hostname }} verification passed:
          PVE API=responsive,
          IOMMU={{ 'active' if (lan_iommu.stdout | int) > 0 else 'inactive' }},
          WiFi={{ lan_wifi_count.stdout | trim }} devices

# ── Play 5: Mesh WiFi LXC assertions (wifi_nodes except router_nodes) ──

- name: Verify OpenWrt Mesh LXC on satellite nodes
  hosts: wifi_nodes:!router_nodes
  gather_facts: false
  tasks:
    - name: Check mesh WiFi container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ meshwifi_ct_id }} | grep -c running
        executable: /bin/bash
      register: mesh_ct_running
      changed_when: false

    - name: Assert mesh WiFi container is running
      ansible.builtin.assert:
        that: (mesh_ct_running.stdout | trim | int) > 0
        fail_msg: "Container {{ meshwifi_ct_id }} is not running on {{ inventory_hostname }}"

    - name: Read mesh WiFi container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ meshwifi_ct_id }}
      register: mesh_ct_cfg
      changed_when: false

    - name: Assert mesh container starts on boot
      ansible.builtin.assert:
        that: "'onboot: 1' in mesh_ct_cfg.stdout"
        fail_msg: "Container {{ meshwifi_ct_id }} on {{ inventory_hostname }} missing onboot: 1"

    - name: Assert mesh container is privileged (unprivileged=0)
      ansible.builtin.assert:
        that: mesh_ct_cfg.stdout is not regex('unprivileged:\\s*1')
        fail_msg: >-
          Container {{ meshwifi_ct_id }} on {{ inventory_hostname }}
          is unprivileged (required: privileged for WiFi PHY namespace move)

    - name: Check WiFi PHY hookscript exists
      ansible.builtin.stat:
        path: "/var/lib/vz/snippets/mesh-wifi-phy-{{ meshwifi_ct_id }}.sh"
      register: mesh_hookscript

    - name: Assert WiFi PHY hookscript is deployed
      ansible.builtin.assert:
        that: mesh_hookscript.stat.exists
        fail_msg: "Hookscript mesh-wifi-phy-{{ meshwifi_ct_id }}.sh not found"

    - name: Assert hookscript is attached
      ansible.builtin.assert:
        that: "'hookscript' in mesh_ct_cfg.stdout"
        fail_msg: "No hookscript attached to container {{ meshwifi_ct_id }}"

    - name: Run mesh container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ meshwifi_ct_id }} -- /bin/sh -c '
          echo "RADIOS=$(iw phy 2>/dev/null | sed -n "s/^Wiphy //p" | tr "\n" ",")";
          echo "MESH_IFACES=$(cat /etc/config/wireless 2>/dev/null | grep -c "mode .mesh.")";
          echo "WPAD=$(opkg list-installed wpad-mesh-openssl 2>/dev/null)"
          '
      register: mesh_health
      changed_when: false
      failed_when: false

    - name: Assert WiFi radios are visible inside container
      ansible.builtin.assert:
        that:
          - mesh_health.rc == 0
          - mesh_health.stdout | regex_search('RADIOS=phy') is not none
        fail_msg: >-
          No WiFi radios visible inside mesh container {{ meshwifi_ct_id }}
          on {{ inventory_hostname }}. PHY namespace move may have failed.
          Output: {{ mesh_health.stdout | default('empty') }}

    - name: Assert mesh interfaces are configured
      ansible.builtin.assert:
        that: mesh_health.stdout | regex_search('MESH_IFACES=(\d+)', '\\1') | first | int > 0
        fail_msg: >-
          No mesh interfaces configured inside container {{ meshwifi_ct_id }}
          on {{ inventory_hostname }}
      when: mesh_health.rc == 0

    - name: Assert wpad-mesh-openssl is installed
      ansible.builtin.assert:
        that: "'wpad-mesh-openssl' in mesh_health.stdout"
        fail_msg: "wpad-mesh-openssl not installed in mesh container on {{ inventory_hostname }}"

    - name: Assert mesh container has deploy_stamp
      ansible.builtin.assert:
        that: "'openwrt_mesh_lxc' in stamp.plays"
        fail_msg: "deploy_stamp missing openwrt_mesh_lxc entry: {{ stamp.plays.keys() | list }}"

    - name: Report mesh LXC verification
      ansible.builtin.debug:
        msg: >-
          Mesh LXC verification passed on {{ inventory_hostname }}:
          container={{ meshwifi_ct_id }}, running=yes,
          privileged=yes, hookscript=deployed
