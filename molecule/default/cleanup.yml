---
# ── Play 1: Primary hosts (directly reachable) ───────────────────
#
# Service-specific cleanup: destroy only known project VMs/containers
# by explicit VMID. NEVER iterate qm list / pct list — that destroys
# non-project resources and is slower.

- name: Clean reset primary Proxmox hosts
  hosts: proxmox:!lan_hosts
  gather_facts: false
  vars:
    backup_dir: /var/lib/ansible-backup
    project_vm_ids:
      - "{{ openwrt_vm_id }}"
    project_ct_ids:
      - "{{ wireguard_ct_id }}"
      - "{{ pihole_ct_id }}"
      - "{{ meshwifi_ct_id }}"
      - "{{ netdata_ct_id }}"
      - "{{ rsyslog_ct_id }}"
  tasks:
    - name: Check for backup manifest
      ansible.builtin.stat:
        path: "{{ backup_dir }}/manifest.json"
      register: manifest_stat

    - name: Skip cleanup if no backup exists
      ansible.builtin.debug:
        msg: "No backup found -- skipping cleanup. The playbook must run first to create a backup."
      when: not manifest_stat.stat.exists

    - name: End play if no backup
      ansible.builtin.meta: end_play
      when: not manifest_stat.stat.exists

    # ── Destroy project VMs by explicit VMID ─────────────────────

    - name: Check which project VMs exist
      ansible.builtin.command:
        cmd: qm status {{ item }}
      loop: "{{ project_vm_ids }}"
      register: _vm_checks
      failed_when: false
      changed_when: false

    - name: Stop existing project VMs
      ansible.builtin.command:
        cmd: qm stop {{ item.item }}
      loop: "{{ _vm_checks.results }}"
      when: item.rc == 0
      failed_when: false

    - name: Wait for VMs to stop
      ansible.builtin.pause:
        seconds: 5
      when: _vm_checks.results | selectattr('rc', 'equalto', 0) | list | length > 0

    - name: Destroy existing project VMs
      ansible.builtin.command:
        cmd: qm destroy {{ item.item }} --purge
      loop: "{{ _vm_checks.results }}"
      when: item.rc == 0
      failed_when: false

    # ── Destroy project containers by explicit VMID ──────────────

    - name: Check which project containers exist
      ansible.builtin.command:
        cmd: pct status {{ item }}
      loop: "{{ project_ct_ids }}"
      register: _ct_checks
      failed_when: false
      changed_when: false

    - name: Stop existing project containers
      ansible.builtin.command:
        cmd: pct stop {{ item.item }}
      loop: "{{ _ct_checks.results }}"
      when: item.rc == 0
      failed_when: false

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 3
      when: _ct_checks.results | selectattr('rc', 'equalto', 0) | list | length > 0

    - name: Destroy existing project containers
      ansible.builtin.command:
        cmd: pct destroy {{ item.item }} --purge
      loop: "{{ _ct_checks.results }}"
      when: item.rc == 0
      failed_when: false

    # ── PCI passthrough cleanup ──────────────────────────────────

    - name: Unbind devices from vfio-pci
      ansible.builtin.shell:
        cmd: |
          for dev in /sys/bus/pci/drivers/vfio-pci/0000:*/; do
            [ -d "$dev" ] || continue
            addr=$(basename "$dev")
            echo "$addr" > /sys/bus/pci/drivers/vfio-pci/unbind 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Check if PCI passthrough config exists
      ansible.builtin.stat:
        path: /etc/modprobe.d/vfio-pci.conf
      register: _vfio_conf

    # ── Remove ansible-managed config files ──────────────────────

    - name: Remove ansible-managed config files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/network/interfaces.d/ansible-bridges.conf
        - /etc/network/interfaces.d/ansible-proxmox-lan.conf
        - /etc/network/interfaces.d/ansible-temp-lan.conf
        - /etc/modprobe.d/blacklist-wifi.conf
        - /etc/modprobe.d/vfio-pci.conf
        - /etc/ansible/facts.d/vm_builds.fact
        - /etc/apt/sources.list.d/pve-no-subscription.sources
        - /etc/modules-load.d/wireguard.conf
        - /tmp/openwrt-router-24.10.0-x86-64-combined.img.gz
        - /tmp/openwrt-router-24.10.0-x86-64-combined.img

    - name: Remove mesh WiFi PHY hookscripts
      ansible.builtin.shell:
        cmd: rm -f /var/lib/vz/snippets/mesh-wifi-phy-*.sh
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Re-enable enterprise repos if disabled
      ansible.builtin.shell:
        cmd: |
          for f in /etc/apt/sources.list.d/pve-enterprise.sources.disabled \
                   /etc/apt/sources.list.d/ceph.sources.disabled; do
            [ -f "$f" ] && mv "$f" "${f%.disabled}"
          done
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Tear down stale bridges
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for br in $(ip -o link show type bridge | awk -F': ' '{print $2}'); do
            grep -q "auto $br" /etc/network/interfaces 2>/dev/null && continue
            ip link set "$br" down 2>/dev/null || true
            ip link delete "$br" 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true

    # ── Kernel / PCI state restoration ───────────────────────────

    - name: Update initramfs after PCI config removal
      ansible.builtin.command:
        cmd: update-initramfs -u -k all
      changed_when: true
      when: _vfio_conf.stat.exists | default(false)

    - name: Reload WiFi kernel modules
      ansible.builtin.shell:
        cmd: |
          modprobe -r iwlmvm iwlwifi 2>/dev/null || true
          modprobe iwlwifi 2>/dev/null || true
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Rescan PCI bus to restore original drivers
      ansible.builtin.shell:
        cmd: echo 1 > /sys/bus/pci/rescan
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Bring up interfaces from restored config
      ansible.builtin.command:
        cmd: ifup --all --force
      changed_when: true
      failed_when: false

    - name: Unload wireguard kernel module
      ansible.builtin.command:
        cmd: modprobe -r wireguard
      failed_when: false
      changed_when: true

    # ── Controller state ─────────────────────────────────────────

    - name: Remove local state file from controller
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../.state/addresses.json"
        state: absent
      delegate_to: localhost

    - name: Remove generated env files from controller
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ playbook_dir }}/../../.env.generated"
        - "{{ playbook_dir }}/../../test.env.generated"
      delegate_to: localhost

# ── Play 2: LAN hosts (cleaned via SSH from primary host) ─────────

- name: Clean up LAN satellite hosts
  hosts: router_nodes
  gather_facts: false
  tasks:
    - name: Process each LAN host
      ansible.builtin.include_tasks: cleanup_lan_host.yml
      vars:
        _lan_host_ip: "{{ hostvars[item].ansible_host }}"
        _lan_host_name: "{{ item }}"
      loop: "{{ groups['lan_hosts'] | default([]) }}"
      when: groups['lan_hosts'] | default([]) | length > 0
