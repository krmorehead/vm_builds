---
# ── Play 1: Primary hosts (directly reachable) ───────────────────

- name: Clean reset primary Proxmox hosts
  hosts: proxmox:!lan_hosts
  gather_facts: false
  vars:
    backup_dir: /var/lib/ansible-backup
  tasks:
    - name: Check for backup manifest
      ansible.builtin.stat:
        path: "{{ backup_dir }}/manifest.json"
      register: manifest_stat

    - name: Skip cleanup if no backup exists
      ansible.builtin.debug:
        msg: "No backup found -- skipping cleanup. The playbook must run first to create a backup."
      when: not manifest_stat.stat.exists

    - name: End play if no backup
      ansible.builtin.meta: end_play
      when: not manifest_stat.stat.exists

    - name: Read backup manifest
      ansible.builtin.slurp:
        src: "{{ backup_dir }}/manifest.json"
      register: manifest_raw

    - name: Parse manifest
      ansible.builtin.set_fact:
        manifest: "{{ manifest_raw.content | b64decode | from_json }}"

    - name: List all current VMs
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          qm list 2>/dev/null | awk 'NR>1 {print $1}'
        executable: /bin/bash
      register: current_vms
      changed_when: false

    - name: Stop all VMs
      ansible.builtin.command:
        cmd: qm stop {{ item }}
      loop: "{{ current_vms.stdout_lines | default([]) }}"
      failed_when: false

    - name: Wait for VMs to stop
      ansible.builtin.pause:
        seconds: 5
      when: current_vms.stdout_lines | default([]) | length > 0

    - name: Destroy all VMs
      ansible.builtin.command:
        cmd: qm destroy {{ item }} --purge
      loop: "{{ current_vms.stdout_lines | default([]) }}"
      failed_when: false

    - name: List all current containers
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct list 2>/dev/null | awk 'NR>1 {print $1}'
        executable: /bin/bash
      register: current_cts
      changed_when: false

    - name: Stop all containers
      ansible.builtin.command:
        cmd: pct stop {{ item }}
      loop: "{{ current_cts.stdout_lines | default([]) }}"
      failed_when: false

    - name: Wait for containers to stop
      ansible.builtin.pause:
        seconds: 3
      when: current_cts.stdout_lines | default([]) | length > 0

    - name: Destroy all containers
      ansible.builtin.command:
        cmd: pct destroy {{ item }} --purge
      loop: "{{ current_cts.stdout_lines | default([]) }}"
      failed_when: false

    - name: Unbind devices from vfio-pci
      ansible.builtin.shell:
        cmd: |
          for dev in /sys/bus/pci/drivers/vfio-pci/0000:*/; do
            [ -d "$dev" ] || continue
            addr=$(basename "$dev")
            echo "$addr" > /sys/bus/pci/drivers/vfio-pci/unbind 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Remove ansible-managed config files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/network/interfaces.d/ansible-bridges.conf
        - /etc/network/interfaces.d/ansible-proxmox-lan.conf
        - /etc/network/interfaces.d/ansible-temp-lan.conf
        - /etc/modprobe.d/blacklist-wifi.conf
        - /etc/modprobe.d/vfio-pci.conf
        - /etc/ansible/facts.d/vm_builds.fact
        - /etc/apt/sources.list.d/pve-no-subscription.sources
        - /etc/modules-load.d/wireguard.conf
        - /tmp/openwrt-router-24.10.0-x86-64-combined.img.gz
        - /tmp/openwrt-router-24.10.0-x86-64-combined.img

    - name: Remove cached LXC templates
      ansible.builtin.shell:
        cmd: rm -f /var/lib/vz/template/cache/debian-*.tar.zst /var/lib/vz/template/cache/openwrt-*.tar.gz
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Remove mesh WiFi PHY hookscripts
      ansible.builtin.shell:
        cmd: rm -f /var/lib/vz/snippets/mesh-wifi-phy-*.sh
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Re-enable enterprise repos if disabled
      ansible.builtin.shell:
        cmd: |
          for f in /etc/apt/sources.list.d/pve-enterprise.sources.disabled \
                   /etc/apt/sources.list.d/ceph.sources.disabled; do
            [ -f "$f" ] && mv "$f" "${f%.disabled}"
          done
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Tear down stale bridges
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for br in $(ip -o link show type bridge | awk -F': ' '{print $2}'); do
            grep -q "auto $br" /etc/network/interfaces 2>/dev/null && continue
            ip link set "$br" down 2>/dev/null || true
            ip link delete "$br" 2>/dev/null || true
          done
        executable: /bin/bash
      changed_when: true

    - name: Restore host configuration from backup
      ansible.builtin.unarchive:
        src: "{{ manifest.host_config }}"
        dest: /
        remote_src: true

    - name: Update initramfs
      ansible.builtin.command:
        cmd: update-initramfs -u -k all
      changed_when: true

    - name: Reload WiFi kernel modules
      ansible.builtin.shell:
        cmd: |
          modprobe -r iwlmvm iwlwifi 2>/dev/null || true
          modprobe iwlwifi 2>/dev/null || true
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Rescan PCI bus to restore original drivers
      ansible.builtin.shell:
        cmd: echo 1 > /sys/bus/pci/rescan
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Bring up interfaces from restored config
      ansible.builtin.command:
        cmd: ifup --all --force
      changed_when: true
      failed_when: false

    - name: Unload wireguard kernel module
      ansible.builtin.command:
        cmd: modprobe -r wireguard
      failed_when: false
      changed_when: true

    - name: Remove local state file from controller
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../.state/addresses.json"
        state: absent
      delegate_to: localhost

    - name: Remove generated env files from controller
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ playbook_dir }}/../../.env.generated"
        - "{{ playbook_dir }}/../../test.env.generated"
      delegate_to: localhost

# ── Play 2: LAN hosts (cleaned via SSH from primary host) ─────────

- name: Clean up LAN satellite hosts
  hosts: router_nodes
  gather_facts: false
  tasks:
    - name: Process each LAN host
      ansible.builtin.include_tasks: cleanup_lan_host.yml
      vars:
        _lan_host_ip: "{{ hostvars[item].ansible_host }}"
        _lan_host_name: "{{ item }}"
      loop: "{{ groups['lan_hosts'] | default([]) }}"
      when: groups['lan_hosts'] | default([]) | length > 0
