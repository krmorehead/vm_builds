---
- name: Reconstruct rsyslog dynamic group
  hosts: monitoring_nodes
  gather_facts: false
  tasks:
    - name: Include group reconstruction
      ansible.builtin.include_tasks: ../../tasks/reconstruct_rsyslog_group.yml

- name: Verify rsyslog LXC container
  hosts: monitoring_nodes
  gather_facts: false
  tasks:
    # ── Container state ──────────────────────────────────────────

    - name: Check container is running
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct status {{ rsyslog_ct_id }} | grep -c running
        executable: /bin/bash
      register: _rsyslog_running
      changed_when: false

    - name: Assert container is running
      ansible.builtin.assert:
        that: (_rsyslog_running.stdout | trim | int) > 0
        fail_msg: "Container {{ rsyslog_ct_id }} is not running"

    # ── Container config (single read) ───────────────────────────

    - name: Read container config (single call)
      ansible.builtin.command:
        cmd: pct config {{ rsyslog_ct_id }}
      register: _rsyslog_cfg
      changed_when: false

    - name: Assert onboot is enabled
      ansible.builtin.assert:
        that: "'onboot: 1' in _rsyslog_cfg.stdout"
        fail_msg: "Container {{ rsyslog_ct_id }} missing onboot: 1"

    - name: Assert startup order is 3
      ansible.builtin.assert:
        that: _rsyslog_cfg.stdout is regex('startup:.*order=3')
        fail_msg: "Container {{ rsyslog_ct_id }} missing startup order=3"

    # ── rsyslog health checks (batched single pct exec) ──────────

    - name: Run rsyslog container health checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ rsyslog_ct_id }} -- /bin/sh -c '
          echo "RECV=$(test -f /etc/rsyslog.d/10-receive.conf && echo present || echo missing)";
          echo "ROUTE=$(test -f /etc/rsyslog.d/50-remote-route.conf && echo present || echo missing)";
          echo "RECV_CONTENT=$(cat /etc/rsyslog.d/10-receive.conf 2>/dev/null)";
          echo "ALLOWED=$(grep -r AllowedSender /etc/rsyslog.d/ 2>/dev/null && echo found || echo clean)";
          echo "SVC=$(systemctl is-active rsyslog 2>/dev/null || echo inactive)";
          /usr/sbin/rsyslogd -N1 >/dev/null 2>&1; echo "CFG_VALID=$?";
          echo "TCP514=$(ss -tlnp 2>/dev/null | grep -c ":514")";
          echo "SPOOL=$(test -d /var/spool/rsyslog && echo present || echo missing)"
          '
      register: _rsyslog_health
      changed_when: false

    - name: Assert 10-receive.conf is baked
      ansible.builtin.assert:
        that: "'RECV=present' in _rsyslog_health.stdout"
        fail_msg: "/etc/rsyslog.d/10-receive.conf missing (should be baked in image)"

    - name: Assert 50-remote-route.conf is baked
      ansible.builtin.assert:
        that: "'ROUTE=present' in _rsyslog_health.stdout"
        fail_msg: "/etc/rsyslog.d/50-remote-route.conf missing (should be baked in image)"

    - name: Assert 10-receive.conf loads imtcp
      ansible.builtin.assert:
        that:
          - "'imtcp' in _rsyslog_health.stdout"
          - "'514' in _rsyslog_health.stdout"
          - "'RemoteLogFile' in _rsyslog_health.stdout"
        fail_msg: "10-receive.conf content is wrong"

    - name: Assert AllowedSender is not present
      ansible.builtin.assert:
        that: "'ALLOWED=clean' in _rsyslog_health.stdout"
        fail_msg: "Deprecated $AllowedSender found in rsyslog config"

    - name: Assert rsyslog is active
      ansible.builtin.assert:
        that: "'SVC=active' in _rsyslog_health.stdout"
        fail_msg: "rsyslog service not active"

    - name: Assert rsyslog config is valid
      ansible.builtin.assert:
        that: "'CFG_VALID=0' in _rsyslog_health.stdout"
        fail_msg: "rsyslog config validation failed"

    - name: Assert TCP 514 is listening
      ansible.builtin.assert:
        that: _rsyslog_health.stdout | regex_search('TCP514=(\d+)', '\\1') | first | int > 0
        fail_msg: "rsyslog not listening on TCP 514"

    - name: Assert spool directory exists
      ansible.builtin.assert:
        that: "'SPOOL=present' in _rsyslog_health.stdout"
        fail_msg: "/var/spool/rsyslog missing inside container"

    # ── Log reception test ───────────────────────────────────────

    - name: Extract rsyslog container IP from cached config
      ansible.builtin.set_fact:
        _verify_rsyslog_ip: "{{ _rsyslog_cfg.stdout | regex_search('ip=([^/,]+)', '\\1') | first }}"

    - name: Assert container IP is not empty
      ansible.builtin.assert:
        that: (_verify_rsyslog_ip | length) > 0
        fail_msg: "Could not determine rsyslog container IP from pct config"

    - name: Assert container IP does not collide with host IP
      ansible.builtin.assert:
        that: _verify_rsyslog_ip != ansible_host
        fail_msg: >-
          Container IP {{ _verify_rsyslog_ip }} collides with host IP
          {{ ansible_host }} on {{ inventory_hostname }}

    - name: Send test log message to rsyslog container
      ansible.builtin.shell:
        cmd: >-
          logger --tcp -n {{ _verify_rsyslog_ip }} -P 514
          "molecule-rsyslog-verify-test-$(date +%s)"
      changed_when: true

    - name: Wait for log to arrive
      ansible.builtin.pause:
        seconds: 3

    - name: Check test log arrived in container
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name '*.log' -exec grep -l 'molecule-rsyslog-verify-test' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: _rsyslog_test_log
      changed_when: false
      failed_when: false

    - name: Assert test log was received
      ansible.builtin.assert:
        that: _rsyslog_test_log.stdout | trim | length > 0
        fail_msg: "Test log message not found in /var/log/remote/ inside container"

    # ── Multi-source separation test ─────────────────────────────

    - name: Send tagged log messages for separation test
      ansible.builtin.shell:
        cmd: |
          logger --tcp -n {{ _verify_rsyslog_ip }} -P 514 -t testdaemon1 "separation-test-daemon1-$(date +%s)" &&
          logger --tcp -n {{ _verify_rsyslog_ip }} -P 514 -t testdaemon2 "separation-test-daemon2-$(date +%s)"
      changed_when: true

    - name: Wait for tagged logs to arrive
      ansible.builtin.pause:
        seconds: 3

    - name: Check daemon1 log is in its own file
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'testdaemon1.log' -exec grep -c 'separation-test-daemon1' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: _daemon1_log
      changed_when: false
      failed_when: false

    - name: Check daemon2 log is in its own file
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'testdaemon2.log' -exec grep -c 'separation-test-daemon2' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: _daemon2_log
      changed_when: false
      failed_when: false

    - name: Assert per-program log separation works
      ansible.builtin.assert:
        that:
          - (_daemon1_log.stdout | trim | int) > 0
          - (_daemon2_log.stdout | trim | int) > 0
        fail_msg: >-
          Per-program separation failed:
          daemon1={{ _daemon1_log.stdout | trim }},
          daemon2={{ _daemon2_log.stdout | trim }}

    # ── Service restart resilience ───────────────────────────────

    - name: Restart rsyslog inside container
      ansible.builtin.command:
        cmd: pct exec {{ rsyslog_ct_id }} -- systemctl restart rsyslog
      changed_when: true

    - name: Wait for service to stabilize after restart
      ansible.builtin.pause:
        seconds: 2

    - name: Check rsyslog is active after restart
      ansible.builtin.command:
        cmd: pct exec {{ rsyslog_ct_id }} -- systemctl is-active rsyslog
      register: _rsyslog_post_restart
      changed_when: false

    - name: Assert rsyslog survived restart
      ansible.builtin.assert:
        that: "'active' in _rsyslog_post_restart.stdout"
        fail_msg: "rsyslog not active after restart: {{ _rsyslog_post_restart.stdout }}"

    - name: Verify TCP listener survives restart
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- ss -tlnp | grep -c ':514'
        executable: /bin/bash
      register: _rsyslog_listen_post
      changed_when: false

    - name: Assert TCP 514 still listening after restart
      ansible.builtin.assert:
        that: (_rsyslog_listen_post.stdout | trim | int) > 0
        fail_msg: "TCP 514 not listening after rsyslog restart"

    - name: Send post-restart test log
      ansible.builtin.shell:
        cmd: >-
          logger --tcp -n {{ _verify_rsyslog_ip }} -P 514 -t postrestart
          "restart-recovery-test-$(date +%s)"
      changed_when: true

    - name: Wait for post-restart log
      ansible.builtin.pause:
        seconds: 3

    - name: Check post-restart log arrived
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'postrestart.log' -exec grep -c 'restart-recovery-test' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: _post_restart_log
      changed_when: false
      failed_when: false

    - name: Assert log reception works after restart
      ansible.builtin.assert:
        that: (_post_restart_log.stdout | trim | int) > 0
        fail_msg: "Log reception failed after rsyslog restart"

    # ── No-leak test: remote messages must NOT appear in local syslog

    - name: Send uniquely tagged message for leak test
      ansible.builtin.shell:
        cmd: >-
          logger --tcp -n {{ _verify_rsyslog_ip }} -P 514 -t leaktest
          "noleak-sentinel-$(date +%s)"
      changed_when: true

    - name: Wait for message processing
      ansible.builtin.pause:
        seconds: 3

    - name: Check message landed in remote log (expected)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          pct exec {{ rsyslog_ct_id }} -- find /var/log/remote/ -name 'leaktest.log' -exec grep -c 'noleak-sentinel' {} + 2>/dev/null | head -1
        executable: /bin/bash
      register: _leak_remote
      changed_when: false
      failed_when: false

    - name: Check message did NOT leak to local syslog
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ rsyslog_ct_id }} -- grep -c 'noleak-sentinel'
          /var/log/syslog 2>/dev/null || echo 0
      register: _leak_local
      changed_when: false
      failed_when: false

    - name: Assert remote messages are isolated from local syslog
      ansible.builtin.assert:
        that:
          - (_leak_remote.stdout | trim | int) > 0
          - (_leak_local.stdout | trim | int) == 0
        fail_msg: >-
          Remote message isolation failed:
          in_remote={{ _leak_remote.stdout | trim }},
          in_local_syslog={{ _leak_local.stdout | trim }}.
          The 50-remote-route.conf stop directive may not be working.

    # ── Logrotate and memory (batched check + separate syntax) ────

    - name: Run logrotate and memory checks (single pct exec)
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ rsyslog_ct_id }} -- /bin/sh -c '
          echo "LOGROTATE=$(test -f /etc/logrotate.d/rsyslog-remote && echo present || echo missing)";
          MEM=$(free -m | awk "/^Mem:/{print \$3}"); echo "MEM=${MEM}"
          '
      register: _rsyslog_extras
      changed_when: false

    - name: Assert logrotate config exists
      ansible.builtin.assert:
        that: "'LOGROTATE=present' in _rsyslog_extras.stdout"
        fail_msg: "/etc/logrotate.d/rsyslog-remote missing"

    - name: Validate logrotate config syntax
      ansible.builtin.command:
        cmd: pct exec {{ rsyslog_ct_id }} -- logrotate --debug /etc/logrotate.d/rsyslog-remote
      register: _logrotate_valid
      changed_when: false
      failed_when: false

    - name: Assert logrotate config is valid
      ansible.builtin.assert:
        that: _logrotate_valid.rc == 0
        fail_msg: "logrotate config invalid: {{ _logrotate_valid.stderr }}"

    - name: Parse rsyslog memory usage
      ansible.builtin.set_fact:
        _rsyslog_mem_mb: "{{ _rsyslog_extras.stdout | regex_search('MEM=(\\d+)', '\\1') | first }}"

    - name: Assert memory usage is reasonable for 64 MB container
      ansible.builtin.assert:
        that: (_rsyslog_mem_mb | int) < 56
        fail_msg: >-
          rsyslog container using {{ _rsyslog_mem_mb }} MB
          of 64 MB allocated — risk of OOM

    # ── Report ───────────────────────────────────────────────────

    - name: Report rsyslog verification
      ansible.builtin.debug:
        msg: >-
          rsyslog per-feature verify passed:
          ct={{ rsyslog_ct_id }}, running=yes,
          config_valid=yes,
          tcp_514=listening,
          log_reception=verified,
          multi_source_separation=verified,
          restart_resilience=verified,
          remote_isolation=verified,
          logrotate=valid,
          memory={{ _rsyslog_mem_mb }}MB
